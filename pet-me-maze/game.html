<!DOCTYPE html>
<html lang="en-us">

<head>
  <meta charset="utf-8">
  <meta http-equiv="Content-Type" content="text/html; charset=utf-8">
  <title>Unity Web Player | PetMeMaze</title>
  <link rel="stylesheet" href="./style.css">
</head>

<body style="text-align: left; padding: 0px; border: 0px; margin: 0px;">
  <script type="application/javascript" src="https://play.delmagames.com/DelmaGameSDK2.0.js"></script>

  <canvas id="unity-canvas" width=600 height=960 tabindex="-1"
    style="width: 100%; height: 100%; background: rgb(255, 255, 255); position: fixed; cursor: default;"></canvas>
  <div id="loading-screen">
    <div class="progressbar" id="loading-bar-container">
      <div class="progressbarnew" id="loading_bar"></div>
    </div>
    <div id="loading-text">Initializing...</div>
  </div>
  <script src="Build/petmemaze_gd_h5.loader.js"></script>
  <script>
    if (/iPhone|iPad|iPod|Android/i.test(navigator.userAgent)) {
      // Mobile device style: fill the whole browser client area with the game canvas:
      var meta = document.createElement('meta');
      meta.name = 'viewport';
      meta.content = 'width=device-width, height=device-height, initial-scale=1.0, user-scalable=no, shrink-to-fit=yes';
      document.getElementsByTagName('head')[0].appendChild(meta);

      var canvas = document.querySelector("#unity-canvas");
      canvas.style.width = "100%";
      canvas.style.height = "100%";
      canvas.style.position = "fixed";

      document.body.style.textAlign = "left";
    }

    var myInstance = null;
    var loadingBar = document.querySelector("#loading_bar");
    var loadingText = document.querySelector("#loading-text");
    var loadingScreen = document.querySelector("#loading-screen");
    loadingBar.style.width = 0 + "%";

    createUnityInstance(document.querySelector("#unity-canvas"), {
      arguments: [],
      dataUrl: "Build/32984d21736fe1041604acf57887741c.data.unityweb",
      frameworkUrl: "Build/32d043aa8c6655881771e7b68faacdb1.js.unityweb",
        codeUrl: "Build/990dbbb7b18fb3209720112341cc8c77.wasm.unityweb",
        streamingAssetsUrl: "StreamingAssets",
      companyName: "PetMeMaze",
      productName: "PetMeMaze",
      productVersion: "0.1",
        // matchWebGLToCanvasSize: false, // Uncomment this to separately control WebGL canvas render size and DOM element size.
        // devicePixelRatio: 1, // Uncomment this to override low DPI rendering on high DPI displays.
      }, (progress) => {
      loadingBar.style.width = (progress * 100) + "%";

      if (progress < 0.3) {
        loadingText.textContent = "Loading assets...";
      } else if (progress < 0.6) {
        loadingText.textContent = "Loading scenes...";
      } else if (progress < 0.9) {
        loadingText.textContent = "Initializing game...";
      } else {
        loadingText.textContent = "Almost ready...";
      }

      if (progress >= 0.9) {
        loadingBar.style.width = 100 + "%";
      }
      }).then((unityInstance) => {
        myInstance = unityInstance;
        loadingScreen.style.display = "none";
      }).catch((message) => {
        alert(message);
      });
  </script>
      <script src="https://play.delmagames.com/delmaGamesConfig.js"></script>
      <script src="https://play.delmagames.com/delmaSplash.js"></script>
    <script>
      var _interstitialState = "loaded";
      window.getInterstitialState = function () { return _interstitialState; };
      window.getIsBannerSupported = function () { return "true"; };
      window.getIsInterstitialSupported = function () { return "true"; };
      window.getMinimumDelayBetweenInterstitial = function () { return "30"; };
      window.setMinimumDelayBetweenInterstitial = function () {};
      window.getIsRewardedSupported = function () { return "true"; };
      window.getRewardedPlacement = function () { return ""; };
      window.showInterstitial = function () {
        if (window.MiniGameAds) {
          _interstitialState = "loading";
          MiniGameAds.showInterstitial({
            beforeAd: function () { _interstitialState = "opened"; },
            afterAd: function () { _interstitialState = "closed"; },
            adBreakDone: function () { _interstitialState = "loaded"; },
          }).catch(function (e) { console.warn("[Ads] interstitial failed:", e); _interstitialState = "loaded"; });
        }
      };
      window.showRewarded = function () {
        if (window.MiniGameAds) {
          var rewardedPromise = MiniGameAds.showRewarded({
            beforeAd: function () {},
            afterAd: function () {},
            adBreakDone: function () {},
            beforeReward: function (showAdFn) { showAdFn(); },
            adDismissed: function () {},
            adViewed: function () {},
          });
          if (rewardedPromise && typeof rewardedPromise.catch === "function") {
            rewardedPromise.catch(function (e) { console.warn("[Ads] rewarded failed:", e); });
          }
        }
      };
      window.checkAdBlock = function () {
        var testAd = document.createElement("div");
        testAd.innerHTML = "&nbsp;";
        testAd.className = "adsbox";
        document.body.appendChild(testAd);
        var isBlocked = testAd.offsetHeight === 0;
        document.body.removeChild(testAd);
        return !isBlocked;
      };
    </script>
</body>

</html>
