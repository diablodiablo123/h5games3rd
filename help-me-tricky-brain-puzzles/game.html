<!doctype html>
<html lang="en-us">
  <head>
    <!--OTP version 1.2-->
    <meta charset="utf-8" />
    <meta http-equiv="Content-Type" content="text/html; charset=utf-8" />
    <title>Help Me - Tricky Brain Puzzle</title>
    <link rel="shortcut icon" href="TemplateData/favicon.ico" />
    <link rel="stylesheet" href="TemplateData/style.css" />
  </head>
  <body>
    <script type="application/javascript" src="https://play.delmagames.com/DelmaGameSDK2.0.js"></script>

    <div
      id="unity-container"
      class="unity-desktop"
      style="width: 100%; height: 100%; overflow-x: hidden; overflow-y: hidden"
    >
      <canvas
        id="unity-canvas"
        style="width: 100%; height: 100%; cursor: default"
      ></canvas>
      <div id="unity-loading-bar">
        <div id="unity-logo"></div>
        <div id="unity-progress-bar-empty">
          <div id="unity-progress-bar-full"></div>
        </div>
      </div>
    </div>
    <script>
      //Lock Scaling/Zooming
      document.getElementsByTagName("head")[0].innerHTML +=
        '<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">';
      document.getElementsByTagName("head")[0].innerHTML +=
        '<meta name="HandheldFriendly" content="true" />';

      document.addEventListener("gesturestart", function (e) {
        e.preventDefault();
      });

      document.addEventListener("gesturechange", function (e) {
        e.preventDefault();
      });
      document.addEventListener("gestureend", function (e) {
        e.preventDefault();
      });

      var container = document.querySelector("#unity-container");
      var canvas = document.querySelector("#unity-canvas");
      var loadingBar = document.querySelector("#unity-loading-bar");
      var progressBarFull = document.querySelector("#unity-progress-bar-full");

      var buildUrl = "Build";
      var loaderUrl = buildUrl + "/709ebd6aa52731772eab1c1021b5ae2d.loader.js";
      var config = {
        dataUrl: buildUrl + "/f27c964fc351486c2de6d66b11643163.data.unityweb",
        frameworkUrl:
          buildUrl + "/b41ca86530b450088577bee99497b28b.framework.js.unityweb",
        codeUrl: buildUrl + "/22de779943398d87cab1e24be2558bcd.wasm.unityweb",
        streamingAssetsUrl: "StreamingAssets",
        companyName: "Matchingham Games",
        productName: "Help Me - Tricky Brain Puzzle",
        productVersion: "1.0",
      };

      //Mobile
      if (/iPhone|iPad|iPod|Android/i.test(navigator.userAgent)) {
        var meta = document.createElement("meta");
        meta.name = "viewport";
        meta.content =
          "width=device-width, height=device-height, initial-scale=1.0, user-scalable=no, shrink-to-fit=yes";
        document.getElementsByTagName("head")[0].appendChild(meta);

        container.className = "unity-mobile";

        canvas.style.width = "100%";
        canvas.style.height = "100%";

        //Resize window when chage orentation
        window.addEventListener("orientationchange", (event) => {
          canvas.style.width = "100%";
          canvas.style.height = "100%";
        });
      }
      //PC
      else {
        canvas.style.width = "100%";
        canvas.style.height = "100%";
      }

      loadingBar.style.display = "block";

      var script = document.createElement("script");
      script.src = loaderUrl;
      script.onload = () => {
        createUnityInstance(canvas, config, (progress) => {
          progressBarFull.style.width = 100 * progress + "%";
        })
          .then((unityInstance) => {
            loadingBar.style.display = "none";
          })
          .catch((message) => {
            alert(message);
          });
      };
      document.body.appendChild(script);
    </script>
    <script src="https://play.delmagames.com/delmaGamesConfig.js"></script>
    <script src="https://play.delmagames.com/delmaSplash.js"></script>
    <script>
      var _interstitialState = "loaded";
      window.getInterstitialState = function () { return _interstitialState; };
      window.getIsBannerSupported = function () { return "true"; };
      window.getIsInterstitialSupported = function () { return "true"; };
      window.getMinimumDelayBetweenInterstitial = function () { return "30"; };
      window.setMinimumDelayBetweenInterstitial = function () {};
      window.getIsRewardedSupported = function () { return "true"; };
      window.getRewardedPlacement = function () { return ""; };
      window.showInterstitial = function () {
        if (window.MiniGameAds) {
          _interstitialState = "loading";
          MiniGameAds.showInterstitial({
            beforeAd: function () { _interstitialState = "opened"; },
            afterAd: function () { _interstitialState = "closed"; },
            adBreakDone: function () { _interstitialState = "loaded"; },
          }).catch(function (e) { console.warn("[Ads] interstitial failed:", e); _interstitialState = "loaded"; });
        }
      };
      window.showRewarded = function () {
        if (window.MiniGameAds) {
          var rewardedPromise = MiniGameAds.showRewarded({
            beforeAd: function () {},
            afterAd: function () {},
            adBreakDone: function () {},
            beforeReward: function (showAdFn) { showAdFn(); },
            adDismissed: function () {},
            adViewed: function () {},
          });
          if (rewardedPromise && typeof rewardedPromise.catch === "function") {
            rewardedPromise.catch(function (e) { console.warn("[Ads] rewarded failed:", e); });
          }
        }
      };
      window.checkAdBlock = function () {
        var testAd = document.createElement("div");
        testAd.innerHTML = "&nbsp;";
        testAd.className = "adsbox";
        document.body.appendChild(testAd);
        var isBlocked = testAd.offsetHeight === 0;
        document.body.removeChild(testAd);
        return !isBlocked;
      };
    </script>
  </body>
</html>
