<!--Rubicon version 0.1.0-->
<!DOCTYPE html>
<html lang="en-us">

<head>
    <meta charset="utf-8">
    <meta http-equiv="Content-Type" content="text/html; charset=utf-8">
    <title>Snow Ball Racing Multiplayer - Rubicon - Play online</title>
    <link rel="shortcut icon" href="TemplateData/rubicon-logo.svg">
    <link rel="stylesheet" href="TemplateData/style.css">
</head>

<body style="background-color: white; overflow: hidden">
	<script type="application/javascript" src="https://play.delmagames.com/DelmaGameSDK2.0.js"></script>

    <div id="game-container" class="game-desktop"
        style="width: 100%; height: 100%; overflow-x: hidden; overflow-y: hidden;">
        <canvas id="drawing" style="width: 100%; height: 100%;"></canvas>
        <canvas id="game-canvas" style="width: 100%; height: 100%; cursor: default;"></canvas>
        <div id="loading-view">
            <div id="game-logo">
            </div>
            <p id="loading-game-name"></p>
            <div class="progress">
                <div class="loading-progress-bar"></div>
            </div>
        </div>
        <div id="float-overlay" style="height: 100%; width: 100%; position: fixed; z-index: 200; display: none">

            <div id="con_fullscreen" style="position: fixed; cursor: pointer">
                <img id="fullscreen" class="float_ico_mini_mobile" src="TemplateData/unwrap.svg" width="50px"
                    style="overflow: hidden">
            </div>

            <style>
                @media screen and (min-width: 1000px) {
                    .float_ico {
                        width: 50px;
                    }

                    .float_ico_mini_mobile {
                        width: 40px;
                    }

                    #con_discord {
                        left: 20px;
                        bottom: 20px;
                    }

                    #con_telegram {
                        left: 65px;
                        bottom: 20px;
                    }

                    #con_fullscreen {
                        bottom: 20px;
                        right: 20px;
                    }

                    #con_discord._mobile {
                        left: 10px;
                        bottom: 10px;
                    }

                    #con_telegram._mobile {
                        left: 45px;
                        bottom: 10px;
                    }

                    #con_fullscreen._mobile {
                        bottom: 10px;
                        right: 10px;
                    }

                    #con_discord._mobile>.float_ico_mini_mobile {
                        width: 30px;
                    }

                    #con_telegram._mobile>.float_ico_mini_mobile {
                        width: 30px;
                    }

                    #con_fullscreen._mobile>.float_ico_mini_mobile {
                        width: 30px;
                    }
                }

                @media screen and (max-width: 1000px) {
                    .float_ico {
                        width: 40px;
                    }

                    .float_ico_mini_mobile {
                        width: 30px;
                    }

                    #con_discord {
                        left: 10px;
                        bottom: 10px;
                    }

                    #con_telegram {
                        left: 45px;
                        bottom: 10px;
                    }

                    #con_fullscreen {
                        bottom: 10px;
                        right: 10px;
                    }
                }
            </style>
        </div>
        <div id="mobile-orentation"
            style="height: 100%; width: 100%; position: absolute; background-color: white; display: none; bottom: 0;">
            <img src="TemplateData/orient_anim.svg" style="position: absolute;
        margin: auto;
        left: 0;
        right: 0;
        bottom: 0;
        top: -10%;" />
        </div>
    </div>

    <script src="TemplateData/drawing.js"></script>

    <script>
        // Hide fullscreen button if running in an iframe
        if (window.self !== window.top) {
            document.getElementById("con_fullscreen").style.display = "none";
        }
    </script>

    <script>

        var container = document.querySelector("#game-container");
        var canvas = document.querySelector("#game-canvas");

        //---------------------- FullScreen
        var fullscreenButton = document.getElementById("fullscreen");

        fullscreenButton.addEventListener("click", function () {
            var doc = window.document;
            var docEl = doc.documentElement;

            var requestFullScreen = docEl.requestFullscreen || docEl.mozRequestFullScreen || docEl.webkitRequestFullScreen || docEl.msRequestFullscreen;
            var cancelFullScreen = doc.exitFullscreen || doc.mozCancelFullScreen || doc.webkitExitFullscreen || doc.msExitFullscreen;

            if (!doc.fullscreenElement && !doc.mozFullScreenElement && !doc.webkitFullscreenElement && !doc.msFullscreenElement) {
                requestFullScreen.call(docEl);
                fullscreenButton.src = "TemplateData/roll_up.svg";
            }
            else {
                cancelFullScreen.call(doc);
                fullscreenButton.src = "TemplateData/unwrap.svg";
            }
        });

        //Mobile
        if (/Android|webOS|iPhone|iPad|iPod|BlackBerry|IEMobile|Opera Mini/i.test(navigator.userAgent)) {
            var meta = document.createElement('meta');
            meta.name = 'viewport';
            meta.content = 'width=device-width, height=device-height, initial-scale=1.0, user-scalable=no, shrink-to-fit=yes';
            document.getElementsByTagName('head')[0].appendChild(meta);

            container.className = "unity-mobile";

            canvas.style.width = "100%";
            canvas.style.height = "100%";

            //Resize window when chage orentation
            window.addEventListener("orientationchange", event => {
                canvas.style.width = "100%";
                canvas.style.height = "100%";
            });

            document.getElementById("con_fullscreen").classList.add("_mobile");
        }
        //PC
        else {
            canvas.style.width = "100%";
            canvas.style.height = "100%";
        }

        const isFullscreenSupported =
            document.fullscreenEnabled ||
            document.webkitFullscreenEnabled ||
            'requestFullscreen' in document.documentElement ||
            'webkitRequestFullscreen' in document.documentElement;

        if (!isFullscreenSupported) {
            fullscreenButton.style.display = "none";
        }

        scriptEle = document.createElement("script");
        scriptEle.src = "loading.js";
        document.body.appendChild(scriptEle);

        scriptEle = document.createElement("script");
        scriptEle.src = "TemplateData/checkOrientation.js";
        document.body.appendChild(scriptEle);

        //----------------------
    </script>
    <script src="https://play.delmagames.com/delmaGamesConfig.js"></script>    <script>
      var _interstitialState = "loaded";
      window.getInterstitialState = function () { return _interstitialState; };
      window.getIsBannerSupported = function () { return "true"; };
      window.getIsInterstitialSupported = function () { return "true"; };
      window.getMinimumDelayBetweenInterstitial = function () { return "30"; };
      window.setMinimumDelayBetweenInterstitial = function () {};
      window.getIsRewardedSupported = function () { return "true"; };
      window.getRewardedPlacement = function () { return ""; };
      window.showInterstitial = function () {
        if (window.MiniGameAds) {
          _interstitialState = "loading";
          MiniGameAds.showInterstitial({
            beforeAd: function () { _interstitialState = "opened"; },
            afterAd: function () { _interstitialState = "closed"; },
            adBreakDone: function () { _interstitialState = "loaded"; },
          }).catch(function (e) { console.warn("[Ads] interstitial failed:", e); _interstitialState = "loaded"; });
        }
      };
      window.showRewarded = function () {
        if (window.MiniGameAds) {
          var rewardedPromise = MiniGameAds.showRewarded({
            beforeAd: function () {},
            afterAd: function () {},
            adBreakDone: function () {},
            beforeReward: function (showAdFn) { showAdFn(); },
            adDismissed: function () {},
            adViewed: function () {},
          });
          if (rewardedPromise && typeof rewardedPromise.catch === "function") {
            rewardedPromise.catch(function (e) { console.warn("[Ads] rewarded failed:", e); });
          }
        }
      };
      window.checkAdBlock = function () {
        var testAd = document.createElement("div");
        testAd.innerHTML = "&nbsp;";
        testAd.className = "adsbox";
        document.body.appendChild(testAd);
        var isBlocked = testAd.offsetHeight === 0;
        document.body.removeChild(testAd);
        return !isBlocked;
      };
    </script>
</body>

</html>
