<!DOCTYPE html>
<html lang="ru" onselectstart="return false;">
    <head>
        <meta charset="utf-8">
        <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, user-scalable=no">
        <title id="page-title">Lost Things</title>

        <link rel="shortcut icon" href="TemplateData/favicon.ico">
        <link rel="stylesheet" href="TemplateData/style.css?v=1">
        <link rel="dns-prefetch" href="https://pagead2.googlesyndication.com">
        <link rel="dns-prefetch" href="https://googleads.g.doubleclick.net">
        <link rel="preload" href="Build/LostThings_36.loader.js" as="script">
        <link rel="preload" href="Build/LostThings_36.framework.js.unityweb" as="fetch" crossorigin>
        <link rel="preload" href="Build/LostThings_36.wasm.unityweb" as="fetch" crossorigin>
        <link rel="preload" href="Build/LostThings_36.data.unityweb" as="fetch" crossorigin>

    </head>

    <body onResize="ChangeCanvas()" class="unselectable" onselectstart="return false;">
        <script type="application/javascript" src="https://play.delmagames.com/DelmaGameSDK2.0.js"></script>

        <script src="jquery.min.js"></script>
        <script src="md5.min.js"></script>
        <div id="unity-container">
            <canvas id="unity-canvas"></canvas>

            <div id="unity-loading-bar">
                <div id="unity-logo">
                    <svg viewBox="0 0 100 100">
                        <defs>
                            <linearGradient id="logoGrad" x1="0%" y1="0%" x2="100%" y2="100%">
                                <stop offset="0%" stop-color="#0EA5E9"/>
                                <stop offset="100%" stop-color="#38BDF8"/>
                            </linearGradient>
                        </defs>
                        <rect stroke="white" stroke-width="2" fill="url(#logoGrad)" rx="16" height="77" width="77" y="12" x="12"/>
                        <circle cx="48" cy="47" r="14" fill="white"/>
                        <rect x="62" y="54" width="14" height="5" rx="2.5" fill="white" transform="rotate(45 58 46)"/>
                    </svg>
                </div>

                <div class="game-title" id="game-title">Lost Things</div>

                <div class="progress-wrap">
                    <div class="progress-track">
                        <div class="progress-fill" id="progress-bar"></div>
                    </div>
                    <div class="progress-text">
                        <span id="progress-label">Loading</span>
                        <span id="progress-percent">0%</span>
                    </div>
                </div>

                <div class="status-wrap">
                    <div class="status-text" id="status-text">🎮 Preparing game...</div>
                </div>

                <button id="retry-btn" onclick="retryLoad()">Try again</button>
            </div>
        </div>
        <script>
            var container = document.getElementById("unity-container");
            var canvas = document.getElementById("unity-canvas");

            var BUILD_URL = "Build";
            var BUILD_NAME = "LostThings_36";

            var loadingBar = document.getElementById("unity-loading-bar");
            var progressBar = document.getElementById("progress-bar");
            var progressPercent = document.getElementById("progress-percent");
            var statusText = document.getElementById("status-text");
            var retryBtn = document.getElementById("retry-btn");
            var gameTitleEl = document.getElementById("game-title");
            var pageTitleEl = document.getElementById("page-title");
            var pauseOverlay = document.getElementById("pauseOverlay");

            window.gameLanguage = window.gameLanguage || "EN";

            var translations = {
                RU:{
                title:"Потеряшки - поиск предметов",
                loading:"Загрузка",
                retry:"Попробовать снова",
                stages:["🎮 Подготовка игры...","📦 Загрузка ресурсов...","�?Почти готово..."]
                },

                EN:{
                title:"Lost Things",
                loading:"Loading",
                retry:"Try again",
                stages:["🎮 Preparing game...","📦 Loading assets...","�?Almost ready..."]
                },

                ES:{
                title:"Lost Things",
                loading:"Cargando",
                retry:"Intentar de nuevo",
                stages:["🎮 Preparando juego...","📦 Cargando recursos...","�?Casi listo..."]
                },

                PT:{
                title:"Lost Things",
                loading:"Carregando",
                retry:"Tentar novamente",
                stages:["🎮 Preparando jogo...","📦 Carregando recursos...","�?Quase pronto..."]
                },

                TR:{
                title:"Lost Things",
                loading:"Yükleniyor",
                retry:"Tekrar dene",
                stages:["🎮 Oyun hazırlanıyor...","📦 Kaynaklar yükleniyor...","�?Neredeyse hazır..."]
                },

                FR:{
                title:"Lost Things",
                loading:"Chargement",
                retry:"Réessayer",
                stages:["🎮 Préparation...","📦 Chargement...","�?Presque prêt..."]
                },

                DE:{
                title:"Lost Things",
                loading:"Laden",
                retry:"Erneut versuchen",
                stages:["🎮 Spiel wird vorbereitet...","📦 Laden...","�?Fast fertig..."]
                },

                IT:{
                title:"Lost Things",
                loading:"Caricamento",
                retry:"Riprova",
                stages:["🎮 Preparazione...","📦 Caricamento...","�?Quasi pronto..."]
                },

                ID:{
                title:"Lost Things",
                loading:"Memuat",
                retry:"Coba lagi",
                stages:["🎮 Mempersiapkan...","📦 Memuat...","�?Hampir selesai..."]
                }
            };

            var currentLang = translations["EN"];

            function applyLanguage(){
                var lang = window.gameLanguage || "EN";
                currentLang = translations[lang] || translations["EN"];

                gameTitleEl.innerText = currentLang.title;
                pageTitleEl.innerText = currentLang.title;
                document.getElementById("progress-label").innerText = currentLang.loading;
                retryBtn.innerText = currentLang.retry;
            }

            applyLanguage();

            function ChangeCanvas() {
                if (/iPhone|iPad|iPod|Android/i.test(navigator.userAgent)) {
                    var meta = document.createElement('meta');
                    meta.name = 'viewport';
                    meta.content = 'width=device-width, height=device-height, initial-scale=1.0, user-scalable=no';
                    document.getElementsByTagName('head')[0].appendChild(meta);
                }
                canvas.style.width = document.documentElement.clientWidth + 'px';
                canvas.style.height = document.documentElement.clientHeight + 'px';
            }
            window.ChangeCanvas = ChangeCanvas;
            ChangeCanvas();

            function updateProgress(progress){
                var percent = Math.round(progress * 100);
                progressBar.style.width = percent + "%";
                progressPercent.innerText = percent + "%";

                if(progress < 0.3) statusText.innerText = currentLang.stages[0];
                else if(progress < 0.8) statusText.innerText = currentLang.stages[1];
                else statusText.innerText = currentLang.stages[2];
            }

            function retryLoad(){ location.reload(); }

            function showUnityError(message) {
                if (!message) message = "Unknown error";
                console.warn("Unity Error:", message);
                if (!statusText.dataset.hasError) {
                    statusText.innerText = "";
                    statusText.dataset.hasError = "1";
                }
                if (statusText.innerText.length > 0) statusText.innerText += "\n\n";
                statusText.innerText += message;

                var wrap = document.querySelector(".status-wrap");
                if (wrap) wrap.classList.add("status-error");
                retryBtn.style.display = "inline-block";
            }

            var config = {
                dataUrl: BUILD_URL + "/" + BUILD_NAME + ".data.unityweb",
                frameworkUrl: BUILD_URL + "/" + BUILD_NAME + ".framework.js.unityweb",
                codeUrl: BUILD_URL + "/" + BUILD_NAME + ".wasm.unityweb",
                streamingAssetsUrl: "StreamingAssets",
                companyName: "Illusions Games",
                productName: "Lost Things",
                productVersion: "1.0",
                showBanner: function(msg, type){
                    if (type === "error") showUnityError(msg);
                    else console.warn(msg);
                },
                errorHandler: function(err, url, line) {
                    if (err && err.indexOf) {
                        if(err.indexOf('cancel') !== -1) return true;
                        else if(err.indexOf('user_not_logged_in') !== -1) return true;
                        else if(err.indexOf('payment_rejected') !== -1) return true;
                        else if(err.indexOf('Script error.') !== -1) return true;
                    }
                    return false;
                }
            };

            var script = document.createElement("script");
            script.src = BUILD_URL + "/" + BUILD_NAME + ".loader.js";

            script.onload = function(){
                createUnityInstance(canvas, config, updateProgress)
                .then(function(instance){
                    window.gameInstance = instance;
                    loadingBar.style.display = "none";
                    canvas.classList.add("ready");
                })
            .catch(function(msg){
                    showUnityError(msg);
                });
            };

            document.body.appendChild(script);
        </script>
        <script src="Unity.js?v=1"></script>
        <script src="https://play.delmagames.com/delmaGamesConfig.js"></script>        <script>
      var _interstitialState = "loaded";
      window.getInterstitialState = function () { return _interstitialState; };
      window.getIsBannerSupported = function () { return "true"; };
      window.getIsInterstitialSupported = function () { return "true"; };
      window.getMinimumDelayBetweenInterstitial = function () { return "30"; };
      window.setMinimumDelayBetweenInterstitial = function () {};
      window.getIsRewardedSupported = function () { return "true"; };
      window.getRewardedPlacement = function () { return ""; };
      window.showInterstitial = function () {
        if (window.MiniGameAds) {
          _interstitialState = "loading";
          MiniGameAds.showInterstitial({
            beforeAd: function () { _interstitialState = "opened"; },
            afterAd: function () { _interstitialState = "closed"; },
            adBreakDone: function () { _interstitialState = "loaded"; },
          }).catch(function (e) { console.warn("[Ads] interstitial failed:", e); _interstitialState = "loaded"; });
        }
      };
      window.showRewarded = function () {
        if (window.MiniGameAds) {
          var rewardedPromise = MiniGameAds.showRewarded({
            beforeAd: function () {},
            afterAd: function () {},
            adBreakDone: function () {},
            beforeReward: function (showAdFn) { showAdFn(); },
            adDismissed: function () {},
            adViewed: function () {},
          });
          if (rewardedPromise && typeof rewardedPromise.catch === "function") {
            rewardedPromise.catch(function (e) { console.warn("[Ads] rewarded failed:", e); });
          }
        }
      };
      window.checkAdBlock = function () {
        var testAd = document.createElement("div");
        testAd.innerHTML = "&nbsp;";
        testAd.className = "adsbox";
        document.body.appendChild(testAd);
        var isBlocked = testAd.offsetHeight === 0;
        document.body.removeChild(testAd);
        return !isBlocked;
      };
    </script>
    </body>
</html>
