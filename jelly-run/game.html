<!DOCTYPE html>

  <head>

    <style>

            }
    </style>
    <link rel="dns-prefetch" href="https://pagead2.googlesyndication.com">
    <link rel="dns-prefetch" href="https://googleads.g.doubleclick.net">
    <link rel="preload" href="Build/Build.loader.js" as="script">
    <link rel="preload" href="Build/ac77eb71d9c028fc76337272ca3dea12.js.unityweb" as="fetch" crossorigin>
    <link rel="preload" href="Build/c9168b14c2114d60fa3af4cc60b798c6.wasm.unityweb" as="fetch" crossorigin>
    <link rel="preload" href="Build/e764027ece7a83467d37a91ef070ca7f.data.unityweb.br" as="fetch" crossorigin>
    <script>
        // 脱离 Famobi 环境时提供兼容实现，避免 Unity 桥接调用报错
        (function ensureGameInterface() {
            function noop() {}
            function resolved(value) { return Promise.resolve(value); }

            var gi = window.GameInterface || {};
            gi.sendPreloadProgress = gi.sendPreloadProgress || noop;
            gi.sendProgress = gi.sendProgress || noop;
            gi.sendScore = gi.sendScore || noop;
            gi.track = gi.track || noop;

            gi.gameReady = gi.gameReady || noop;
            gi.gameMuted = gi.gameMuted || noop;
            gi.gameComplete = gi.gameComplete || function () { return resolved(true); };
            gi.gameOver = gi.gameOver || function () { return resolved(true); };
            gi.gamePause = gi.gamePause || function () { return resolved(true); };
            gi.gameQuit = gi.gameQuit || function () { return resolved(true); };
            gi.gameResume = gi.gameResume || function () { return resolved(true); };
            gi.gameStart = gi.gameStart || function () { return resolved(true); };
            gi.showInterstitialAd = gi.showInterstitialAd || function () { return resolved(false); };
            gi.showRewardedAd = gi.showRewardedAd || function () { return resolved(false); };

            gi.getCurrentLanguage = gi.getCurrentLanguage || function () { return "en"; };
            gi.hasFeature = gi.hasFeature || function () { return false; };
            gi.isMuted = gi.isMuted || function () { return false; };
            gi.isPaused = gi.isPaused || function () { return false; };
            gi.isRewardedAdAvailable = gi.isRewardedAdAvailable || function () { return false; };
            gi.getOffsets = gi.getOffsets || function () {
                return { left: 0, top: 0, right: 0, bottom: 0 };
            };

            gi.onGameOver = gi.onGameOver || noop;
            gi.onGoToHome = gi.onGoToHome || noop;
            gi.onGoToLevel = gi.onGoToLevel || noop;
            gi.onGoToNextLevel = gi.onGoToNextLevel || noop;
            gi.onMuteStateChange = gi.onMuteStateChange || noop;
            gi.onOffsetChange = gi.onOffsetChange || noop;
            gi.onPauseStateChange = gi.onPauseStateChange || noop;
            gi.onQuitGame = gi.onQuitGame || noop;
            gi.onRestartGame = gi.onRestartGame || noop;
            gi.onRewardedAdAvailabilityChange = gi.onRewardedAdAvailabilityChange || noop;

            if (!gi.storage) {
                gi.storage = {
                    getItem: function (key) {
                        try { return localStorage.getItem(key); } catch (e) { return null; }
                    },
                    setItem: function (key, value) {
                        try { localStorage.setItem(key, value); } catch (e) {}
                    },
                    removeItem: function (key) {
                        try { localStorage.removeItem(key); } catch (e) {}
                    }
                };
            }

            window.GameInterface = gi;
        })();

        function startUnityGame() {
            document.body.style.textAlign = "left";

            var canvas = document.querySelector("#unity-canvas");
            var config = {
                dataUrl: "Build/e764027ece7a83467d37a91ef070ca7f.data.unityweb",
                frameworkUrl: "Build/ac77eb71d9c028fc76337272ca3dea12.js.unityweb",
                codeUrl: "Build/c9168b14c2114d60fa3af4cc60b798c6.wasm.unityweb",
                streamingAssetsUrl: "StreamingAssets",
                companyName: "goolny",
                productName: "Jelly Run 2048",
                productVersion: "1.44.1",
                devicePixelRatio: Math.min(window.devicePixelRatio, 2),
            };
            var savedProgress = 0;
            var bar = document.getElementById("progress-bar");
            var percentage = document.getElementById("percentage");

            createUnityInstance(canvas, config, function (progress) {
                progress = Math.round(progress * 100);
                if (progress > savedProgress) {
                    savedProgress = progress;
                    window.GameInterface.sendPreloadProgress(progress);
                    bar.style.width = progress + "%";
                    percentage.innerHTML = progress + "%";
                }
            });
        }

        (function loadUnityLoader() {
            var loaderScript = document.createElement("script");
            loaderScript.src = "Build/Build.loader.js";
            loaderScript.onload = startUnityGame;
            loaderScript.onerror = function () {
                console.error("Unity loader 加载失败，请确认 Build/Build.loader.js 存在�?);
            };
            document.head.appendChild(loaderScript);
        })();
    </script>
  </head>
  <body style="text-align: center; padding: 0; border: 0; margin: 0;">
    <script type="application/javascript" src="https://play.delmagames.com/DelmaGameSDK2.0.js"></script>

    <canvas id="unity-canvas" width=960 height=600 tabindex="-1" style="position: fixed; width: 100%; height: 100%; background: #5CA7BA"></canvas>
    
    <div id="background">
        
    </div>

    <div id="application-splash">
        <img src="jelly-run-logo.png" alt="Application Icon">
        <div id="progress-percentage"> 
            <div id="progress-container">
                <div style="height: 20px"></div>
                <span id="percentage" style='color: white; font-size: 150%; text-align: center; font-family: Arial;'>0%</span>

                <div id="progress-bar">
                </div>
            </div>

        </div>
    </div>
    <script src="https://play.delmagames.com/delmaGamesConfig.js"></script>    <script>
      var _interstitialState = "loaded";
      window.getInterstitialState = function () { return _interstitialState; };
      window.getIsBannerSupported = function () { return "true"; };
      window.getIsInterstitialSupported = function () { return "true"; };
      window.getMinimumDelayBetweenInterstitial = function () { return "30"; };
      window.setMinimumDelayBetweenInterstitial = function () {};
      window.getIsRewardedSupported = function () { return "true"; };
      window.getRewardedPlacement = function () { return ""; };
      window.showInterstitial = function () {
        if (window.MiniGameAds) {
          _interstitialState = "loading";
          MiniGameAds.showInterstitial({
            beforeAd: function () { _interstitialState = "opened"; },
            afterAd: function () { _interstitialState = "closed"; },
            adBreakDone: function () { _interstitialState = "loaded"; },
          }).catch(function (e) { console.warn("[Ads] interstitial failed:", e); _interstitialState = "loaded"; });
        }
      };
      window.showRewarded = function () {
        if (window.MiniGameAds) {
          var rewardedPromise = MiniGameAds.showRewarded({
            beforeAd: function () {},
            afterAd: function () {},
            adBreakDone: function () {},
            beforeReward: function (showAdFn) { showAdFn(); },
            adDismissed: function () {},
            adViewed: function () {},
          });
          if (rewardedPromise && typeof rewardedPromise.catch === "function") {
            rewardedPromise.catch(function (e) { console.warn("[Ads] rewarded failed:", e); });
          }
        }
      };
      window.checkAdBlock = function () {
        var testAd = document.createElement("div");
        testAd.innerHTML = "&nbsp;";
        testAd.className = "adsbox";
        document.body.appendChild(testAd);
        var isBlocked = testAd.offsetHeight === 0;
        document.body.removeChild(testAd);
        return !isBlocked;
      };
      // Update GameInterface ad methods
      if (window.GameInterface) {
        window.GameInterface.showInterstitialAd = function () {
          if (window.MiniGameAds) {
            var interstitialPromise = MiniGameAds.showInterstitial({
              beforeAd: function () {},
              afterAd: function () {},
              adBreakDone: function () {},
            });
            if (interstitialPromise && typeof interstitialPromise.catch === "function") {
              return interstitialPromise.catch(function () { return false; }).then(function () { return true; });
            }
          }
          return Promise.resolve(false);
        };
        window.GameInterface.showRewardedAd = function () {
          if (window.MiniGameAds) {
            var rewardedPromise = MiniGameAds.showRewarded({
              beforeAd: function () {},
              afterAd: function () {},
              adBreakDone: function () {},
              beforeReward: function (showAdFn) { showAdFn(); },
              adDismissed: function () {},
              adViewed: function () {},
            });
            if (rewardedPromise && typeof rewardedPromise.catch === "function") {
              return rewardedPromise.catch(function () { return false; }).then(function () { return true; });
            }
          }
          return Promise.resolve(false);
        };
        window.GameInterface.isRewardedAdAvailable = function () { return true; };
      }
    </script>
  </body>
