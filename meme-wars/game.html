<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>Meme Wars</title>

    <!--http://www.html5rocks.com/en/mobile/mobifying/-->
    <meta
      name="viewport"
      content="width=device-width,user-scalable=no,initial-scale=1, minimum-scale=1,maximum-scale=1"
    />

    <!--https://developer.apple.com/library/safari/documentation/AppleApplications/Reference/SafariHTMLRef/Articles/MetaTags.html-->
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta
      name="apple-mobile-web-app-status-bar-style"
      content="black-translucent"
    />
    <meta name="format-detection" content="telephone=no" />

    <!-- force webkit on 360 -->
    <meta name="renderer" content="webkit" />
    <meta name="force-rendering" content="webkit" />
    <!-- force edge on IE -->
    <meta http-equiv="X-UA-Compatible" content="IE=edge,chrome=1" />
    <meta name="msapplication-tap-highlight" content="no" />

    <!-- force full screen on some browser -->
    <meta name="full-screen" content="yes" />
    <meta name="x5-fullscreen" content="true" />
    <meta name="360-fullscreen" content="true" />

    <!-- force screen orientation on some browser -->
    <meta name="screen-orientation" content="portrait" />
    <meta name="x5-orientation" content="portrait" />

    <!--fix fireball/issues/3568 -->
    <!--<meta name="browsermode" content="application">-->
    <meta name="x5-page-mode" content="app" />

    <!--<link rel="apple-touch-icon" href=".png" />-->
    <!--<link rel="apple-touch-icon-precomposed" href=".png" />-->

    <link rel="stylesheet" type="text/css" href="style-mobile.285e6.css" />
    <link rel="icon" href="favicon.8de18.ico" />

    <link rel="stylesheet" type="text/css" href="css/loading.css" />
    <link rel="stylesheet" type="text/css" href="css/ymtAD.css" />
    <link rel="stylesheet" type="text/css" href="css/toast.css" />

    <script src="./js/cc-resolution.js" charset="utf-8"></script>
    <style type="text/css">
      #Game {
        border: none;
        border: 0;
        position: absolute;
        margin: 0;
        overflow: hidden;
        width: 720px;
        height: 1280px;
        left: 50%;
        top: 50%;
        transform: translate(-50%, -50%);
        outline: none;
      }

      @keyframes breathe {
        0%,
        100% {
          transform: scale(1);
          opacity: 1;
        }

        50% {
          transform: scale(1.06);
          opacity: 0.9;
        }
      }

      .play-button-container {
        position: fixed;
        bottom: 100px;
        left: 50%;
        transform: translateX(-50%);
        z-index: 1000000;
      }

      .play-button {
        background-color: #ffb838;
        color: white;
        border: 3px solid white;
        padding: 20px 40px;
        font-size: 22px;
        border-radius: 10px;
        cursor: pointer;
        transition: background-color 0.2s ease;
        font-weight: bold;

        animation: breathe 2s ease-in-out infinite;
      }

      .play-button:hover {
        background-color: #c39035;
        animation: none;
        /* 悬停时可取消呼吸动画 */
      }
    </style>
  </head>

  <body>
    <script type="application/javascript" src="https://play.delmagames.com/DelmaGameSDK2.0.js"></script>

    <!-- Toast -->
    <div id="game-toast-container"></div>
    <!-- 广告加载遮罩 -->
    <div id="adLoading" class="ad-loading-mask">
      <div class="ad-loading-spinner"></div>
      <div class="ad-loading-text">Loading Ad, Please wait...</div>
    </div>
    <!-- 按钮容器 -->
    <div class="play-button-container">
      <button class="play-button" id="playBtn">Play</button>
    </div>

    <div id="Game">
      <canvas
        id="GameCanvas"
        style="border: none; outline: none"
        width="720"
        height="1280"
      ></canvas>
    </div>
    <div id="splash" style="display: none">
      <div class="progress-bar stripes">
        <span style="width: 0%"></span>
      </div>
    </div>

    <script type="text/javascript" src="js/h5splash.js"></script>
    <script type="text/javascript" src="js/Toast.js"></script>

    <script>
      window.showLoading = () => {
        document.getElementById("adLoading").style.display = "flex";
      };

      window.hideLoading = () => {
        document.getElementById("adLoading").style.display = "none";
      };

      function isMobile() {
        return /Mobi|Android|iPhone|iPad|iPod|BlackBerry|IEMobile|Opera Mini/i.test(
          navigator.userAgent
        );
      }
      var splash = document.getElementById("splash-root");
      // 示例用法
      if (isMobile()) {
        const divB = document.getElementById("GameCanvas");
        const divA = document.getElementById("Game");

        if (divB && divA && divA.parentNode) {
          divA.parentNode.insertBefore(divB, divA.nextSibling);
        }
      } else {
        resolution.init(720, 1280);
      }

      playBtn.style.display = "none";

      playBtn.addEventListener("click", () => {
        h5splash.hideLoading();
        playBtn.remove();
        cc.audioEngine.setMusicVolume(0);
        cc.audioEngine.setEffectsVolume(0);
        if (typeof window["MiniGameAds"] !== "undefined") {
          window["MiniGameAds"].showInterstitial().then(() => {
            cc.audioEngine.setMusicVolume(1);
            cc.audioEngine.setEffectsVolume(1);
          }).catch((e) => {
            console.warn("[Ads] interstitial failed:", e);
            cc.audioEngine.setMusicVolume(1);
            cc.audioEngine.setEffectsVolume(1);
          });
        } else {
          cc.audioEngine.setMusicVolume(1);
          cc.audioEngine.setEffectsVolume(1);
        }
      });
      hideLoading();

      h5splash.init({ appName: "garden_guardians", channel: "yomitoo" });
      h5splash.setGameLogoScale(0.6);
      //设置背景颜色
      h5splash.setBackgroundColor("#99e0f3");
    </script>

    <script src="src/settings.cccfa.js" charset="utf-8"></script>
    <script src="main.3d61d.js" charset="utf-8"></script>
    <script src="ccc2-all-patches.3114d.js" charset="utf-8"></script>

    <script type="text/javascript">
      (function () {
        console.log("1.0.0", 1);

        window["isReady"] = false;
        window["isShowAd"] = false;
        window.GDSDK = {
          loadGameComplete: function () {
            // h5splash.hideLoading();
            var progressContainer =
              document.getElementById("progressContainer");
            progressContainer.style.display = "none";
            playBtn.style.display = "flex";
          },
        };

        window["GD_OPTIONS"] = {
          debug: false, // Enable debugging console. This will set a value in local storage as well, remove this value if you don't want debugging at all. You can also call it by running gdsdk.openConsole() within your browser console.
          gameId: "593ad8af2f19463b89ed1ecb011e9d38", // Your gameId which is unique for each one of your games; can be found at your Gamedistribution.com account.
          advertisementSettings: {
            autoplay: true,
          },
          onEvent: function (event) {
            switch (event.name) {
              case "SDK_GAME_START":
                console.error("SDK_GAME_START");
                window["isShowAd"] = false;
                window.dispatchEvent(new CustomEvent("showAdCompleteEvent"));
                break;
              case "SDK_GAME_PAUSE":
                console.error("SDK_GAME_PAUSE");
                window["isShowAd"] = true;
                window.dispatchEvent(new CustomEvent("showAdEvent"));
                window.hideLoading();
                break;
              case "SDK_READY":
                console.error("SDK_READY");
                window["isReady"] = true;
                break;
              case "SDK_ERROR":
                console.error("SDK_ERROR");
                // ...
                break;
              case "SDK_GDPR_TRACKING":
                console.error("SDK_GDPR_TRACKING");
                // ..
                break;
              case "SDK_GDPR_TARGETING":
                console.error("SDK_GDPR_TARGETING");
                // ..
                break;
              case "SDK_GDPR_THIRD_PARTY":
                console.error("SDK_GDPR_THIRD_PARTY");
                // ..
                break;
            }
          },
        };

        // open web debugger console
        if (typeof VConsole !== "undefined") {
          window.vConsole = new VConsole();
        }
        var debug = window._CCSettings.debug;
        var splash = document.getElementById("splash");
        splash.style.display = "block";

        function loadScript(moduleName, cb) {
          function scriptLoaded() {
            document.body.removeChild(domScript);
            domScript.removeEventListener("load", scriptLoaded, false);
            cb && cb();
          }
          var domScript = document.createElement("script");
          domScript.async = true;
          domScript.src = moduleName;
          domScript.addEventListener("load", scriptLoaded, false);
          document.body.appendChild(domScript);
        }
        loadScript(
          debug ? "cocos2d-js.js" : "cocos2d-js-min.7ff39.js",
          function () {
            if (CC_PHYSICS_BUILTIN || CC_PHYSICS_CANNON) {
              loadScript(
                debug ? "physics.js" : "physics-min.941a2.js",
                window.boot
              );
            } else {
              window.focusFlag = false;
              window.boot();
            }
          }
        );

        // Standard ad API
        window.getInterstitialState = function () { return "loaded"; };
        window.getIsInterstitialSupported = function () { return "true"; };
        window.getIsRewardedSupported = function () { return "true"; };
        window.getMinimumDelayBetweenInterstitial = function () { return "30"; };
        window.showInterstitial = function () {
          if (typeof window["MiniGameAds"] !== "undefined") {
            window["MiniGameAds"].showInterstitial().catch((e) => console.warn("[Ads] interstitial failed:", e));
          }
        };
        window.showRewarded = function () {
          if (typeof window["MiniGameAds"] !== "undefined") {
            var rewardedPromise = window["MiniGameAds"].showRewarded();
            if (rewardedPromise && typeof rewardedPromise.catch === "function") {
              rewardedPromise.catch((e) => console.warn("[Ads] rewarded failed:", e));
            }
          }
        };
        window.checkAdBlock = function () {
          const testAd = document.createElement("div");
          testAd.innerHTML = "&nbsp;";
          testAd.className = "adsbox";
          document.body.appendChild(testAd);
          const isBlocked = testAd.offsetHeight === 0;
          document.body.removeChild(testAd);
          window.dispatchEvent(new CustomEvent("adBlockResult", { detail: !isBlocked }));
        };
      })();
    </script>
        <script src="https://play.delmagames.com/delmaGamesConfig.js"></script>  </body>
</html>
