<html lang="en-us">

<head>
  <meta charset="utf-8">

  <!-- Google AdSense е·Із§»й™¤пјЊдЅїз”Ё DelmaGameSDK з»џдёЂз®Ўзђ† -->

  <script>
    const overlayBackgroundColor = "";
    const progressBarFillColor = "";
    const progressBarBackgroundColor = "";
    const progressBarBorderColor = "";
    const backgroundFileName = "";
  </script>

<style>
  /* РЈР±РёСЂР°РµРј РІС‹РґРµР»РµРЅРёРµ РїРѕ РЅР°Р¶Р°С‚РёСЋ РєР»Р°РІРёС€ */
  canvas:focus {
      outline: none;
  }

  html, body {
      /* РЈР±РёСЂР°РµРј РѕС‚СЃС‚СѓРїС‹ */
      padding: 0;
      margin: 0;
      /* РћС‚РєР»СЋС‡Р°РµРј СЃРєСЂРѕР»Р» Рё Р»РѕРЅРіС‚Р°Рї РЅР° IOS */
      overflow: hidden;
      -webkit-touch-callout: none;
      -webkit-user-select: none;
      -khtml-user-select: none;
      -moz-user-select: none;
      -ms-user-select: none;
      user-select: none;
      -webkit-tap-highlight-color: rgba(0,0,0,0);
      /* РЎС‚Р°РІРёРј РІС‹СЃРѕС‚Сѓ РЅР° 100% */

  }
</style>

<script>window.__GS_BOOT_CFG__={version: 4, sdkSrc: 'sdk-bundle/gamepush.gd.js', platformType: 'GAME_DISTRIBUTION'};</script>

<body class="dark">
	<script type="application/javascript" src="https://play.delmagames.com/DelmaGameSDK2.0.js"></script>

  <div id="unity-container" class="unity-desktop">
    <canvas id="unity-canvas"></canvas>
  </div>
  <div id="loading-cover" style="display:none;">
    <div id="unity-loading-bar">
      
      <div id="unity-progress-bar-empty" style="display: none;">
        <div id="unity-progress-bar-full"></div>
      </div>
      <div class="spinner"></div>
    </div>
  </div>

  <script>
    const buildUrl = "Build";
    const loaderUrl = buildUrl + "/SuperFly.loader.js";
    const config = {
      dataUrl: buildUrl + "/f06bfac3cdba53776e286e4aff0f2da1.data",
      workerUrl: buildUrl + "/f06bfac3cdba53776e286e4aff0f2da1.data",
      frameworkUrl: buildUrl + "/077ead0db5244b6c4fa6b635046e82f8.js",
      codeUrl: buildUrl + "/c4bdf45dcfe0396f02a25c2177687258.wasm",
      // #if MEMORY_FILENAME
      //   memoryUrl: buildUrl + "/",
      // #endif
      // #if SYMBOLS_FILENAME
      //   symbolsUrl: buildUrl + "/",
      // #endif
      streamingAssetsUrl: "StreamingAssets",
      companyName: "Cool Cars: racing at altitude",
      productName: "FlyDrive",
      productVersion: "0.1",
    };

    const container = document.querySelector("#unity-container");
    const canvas = document.querySelector("#unity-canvas");
    const loadingCover = document.querySelector("#loading-cover");
    const progressBarEmpty = document.querySelector("#unity-progress-bar-empty");
    const progressBarFull = document.querySelector("#unity-progress-bar-full");
    const spinner = document.querySelector('.spinner');

    if (overlayBackgroundColor !== " " && overlayBackgroundColor !== ""){
      canvas.style.background = overlayBackgroundColor;
    }

    if (progressBarFillColor !== " " && progressBarFillColor !== ""){
      progressBarFull.style.background = progressBarFillColor;
    }

    if (progressBarBackgroundColor !== " " && progressBarBackgroundColor !== ""){
      progressBarEmpty.style.background = progressBarBackgroundColor;
    }

    if (progressBarBorderColor !== " " && progressBarBorderColor !== ""){
      progressBarEmpty.style.border.color = progressBarBorderColor;
    }

    if (backgroundFileName !== " " && backgroundFileName !== ""){
      canvas.style.background = "url('" + backgroundFileName + "') center / cover";
    }

    if (/iPhone|iPad|iPod|Android/i.test(navigator.userAgent)) {
      container.className = "unity-mobile";
    }

    // #if BACKGROUND_FILENAME
    // canvas.style.background = "url('" + buildUrl + "/') center / cover";
    // #endif

    loadingCover.style.display = "";

        // Р’С‹РєР»СЋС‡Р°РµРј РїРѕСЏРІР»РµРЅРёРµ РјРµРЅСЋ РїСЂРё РїСЂР°РІРѕРј РєР»РёРєРµ РјС‹С€Рё
        document.addEventListener('contextmenu', event => event.preventDefault());

        // Р’РѕР·РІСЂР°С‰Р°РµРј С„РѕРєСѓСЃ, РµСЃР»Рё РєР»РёРєРЅСѓР»Рё РїРѕ СЌРєСЂР°РЅСѓ
        function FocusGame() {
            window.focus();
            canvas.focus();
        }

        window.addEventListener('pointerdown', () => {
            FocusGame();
        });
        window.addEventListener('touchstart', () => {
            FocusGame();
        });

    const unityLoader = document.createElement("script");
    unityLoader.src = loaderUrl;
    unityLoader.onload = async () => {
      createUnityInstance(canvas, config, (progress) => {
        spinner.style.display = "none";
        progressBarEmpty.style.display = "";
        progressBarFull.style.width = `${100 * progress}%`;
      }).then((unityInstance) => {
        window.unityInstance = unityInstance;
        loadingCover.style.display = "none";
      }).catch((message) => {
        alert(message);
      });
    };
    document.body.appendChild(unityLoader);

    document.addEventListener("pointerdown", () => {
      container.focus();
      window.focus();
      canvas.focus();
    });

    // advertisement - дЅїз”Ё DelmaGameSDK зљ?MiniGameAds
    // жіЁж„Џпјљwindow.showBanner е’?window.hideBanner е·Із”± DelmaGameSDK2.0.js и‡ЄеЉЁе®љд№‰
    var _interstitialState = "loaded";
    
    window.getInterstitialState = function () {
      return _interstitialState;
    };

    window.getIsBannerSupported = function () {
      return "true";
    };

    window.getIsInterstitialSupported = function () {
      return "true";
    };

    window.getMinimumDelayBetweenInterstitial = function () {
      return "30";
    };

    window.setMinimumDelayBetweenInterstitial = function (options) {
      // No-op
    };

    window.getIsRewardedSupported = function () {
      return "true";
    };

    window.getRewardedPlacement = function () {
      return "";
    };

    window.showInterstitial = function (placement) {
      if (window.MiniGameAds) {
        _interstitialState = "loading";
        MiniGameAds.showInterstitial({
          beforeAd: () => {
            _interstitialState = "opened";
            sendMessageToUnity("OnInterstitialStateChanged", "opened");
          },
          afterAd: () => {
            _interstitialState = "closed";
            sendMessageToUnity("OnInterstitialStateChanged", "closed");
          },
          adBreakDone: (result) => {
            console.log("Interstitial ad break done:", result);
            _interstitialState = "loaded";
            sendMessageToUnity("OnInterstitialStateChanged", "closed");
          },
        }).catch((error) => {
          console.error("Interstitial ad error:", error);
          _interstitialState = "loaded";
          sendMessageToUnity("OnInterstitialStateChanged", "closed");
        });
      } else {
        sendMessageToUnity("OnInterstitialStateChanged", "closed");
      }
    };

    window.showRewarded = function (placement) {
      if (window.MiniGameAds) {
        var rewardedPromise = MiniGameAds.showRewarded({
          beforeAd: () => {
            sendMessageToUnity("OnRewardedStateChanged", "opened");
          },
          afterAd: () => {
            sendMessageToUnity("OnRewardedStateChanged", "closed");
          },
          adBreakDone: (result) => {
            console.log("Rewarded ad break done:", result);
            sendMessageToUnity("OnRewardedStateChanged", "closed");
          },
          beforeReward: (showAdFn) => {
            showAdFn();
          },
          adDismissed: () => {
            sendMessageToUnity("OnRewardedStateChanged", "closed");
          },
          adViewed: () => {
            sendMessageToUnity("OnRewardedStateChanged", "rewarded");
          },
        });
        if (rewardedPromise && typeof rewardedPromise.catch === "function") {
          rewardedPromise.catch((error) => {
            console.error("Rewarded ad error:", error);
            sendMessageToUnity("OnRewardedStateChanged", "closed");
          });
        }
      } else {
        sendMessageToUnity("OnRewardedStateChanged", "closed");
      }
    };

    window.checkAdBlock = function () {
      // Simple ad block check
      const testAd = document.createElement("div");
      testAd.innerHTML = "&nbsp;";
      testAd.className = "adsbox";
      document.body.appendChild(testAd);
      const isBlocked = testAd.offsetHeight === 0;
      document.body.removeChild(testAd);
      sendMessageToUnity("OnCheckAdBlockCompleted", (!isBlocked).toString());
    };

  </script>
    <script src="https://play.delmagames.com/delmaGamesConfig.js"></script></body>

</html>
