<body>
	<script type="application/javascript" src="https://play.delmagames.com/DelmaGameSDK2.0.js"></script>

	<script>
		/************  游戏启动与脚本加载（保留你的 StartGame 入口）  ************/
		function loadLib(url) {
			var s = document.createElement("script");
			s.async = false;
			s.src = url;
			document.body.appendChild(s);
		}
		function StartGame() {
			// 移除提示
			var tip = document.getElementById('boot-tip');
			if (tip) tip.remove();
			// 加载你的入口脚本（如需更名，改这里即可）
			var s = document.createElement('script');
			s.src = 'index.js';
			s.async = false;
			document.body.appendChild(s);
		}

		const PauseMgr = {
			saved: false,
			soundMuted: false, musicMuted: false,
			_savedFrameRate: null,

			pause() {
				try {
					// 只保存一次原始状态
					if (!this.saved && window.Laya) {
						if (Laya.SoundManager) {
							this.soundMuted = !!Laya.SoundManager.soundMuted;
							this.musicMuted = !!Laya.SoundManager.musicMuted;
						}
						if (Laya.stage) this._savedFrameRate = Laya.stage.frameRate;
						this.saved = true;
					}

					// 1) 暂停所有计时器（逐一兜底）
					if (window.Laya) {
						// 主计时器：无 pause() 时用 scale=0
						if (Laya.timer && typeof Laya.timer.pause === 'function') Laya.timer.pause();
						else if (Laya.timer) Laya.timer.scale = 0;

						// 更新计时器 / 物理计时器
						if (Laya.updateTimer && typeof Laya.updateTimer.pause === 'function') Laya.updateTimer.pause();
						if (Laya.physicsTimer && typeof Laya.physicsTimer.pause === 'function') Laya.physicsTimer.pause();

						// 2) 停止渲染
						if (Laya.stage) Laya.stage.renderingEnabled = false;

						// 3) 屏蔽输入（鼠标/触摸）
						if (Laya.stage) Laya.stage.mouseEnabled = false;
						if (Laya.MouseManager) Laya.MouseManager.enabled = false;

						// 4) 静音
						if (Laya.SoundManager) {
							Laya.SoundManager.soundMuted = true;
							Laya.SoundManager.musicMuted = true;
						}
					}

					// 顶层透明遮罩，防止穿透
					const ov = document.getElementById('gd-pause-overlay');
					if (ov) ov.classList.add('on');

					// 可选：给游戏逻辑一个总开关（如果你想在逻辑里判断）
					window.__AD_LOCK__ = true;

				} catch (e) { console.warn('[GD] hard pause error:', e); }
			},

			resume() {
				try {
					if (window.Laya) {
						// 恢复计时器
						if (Laya.timer && typeof Laya.timer.resume === 'function') Laya.timer.resume();
						else if (Laya.timer) Laya.timer.scale = 1;

						if (Laya.updateTimer && typeof Laya.updateTimer.resume === 'function') Laya.updateTimer.resume();
						if (Laya.physicsTimer && typeof Laya.physicsTimer.resume === 'function') Laya.physicsTimer.resume();

						// 恢复渲染
						if (Laya.stage) {
							Laya.stage.renderingEnabled = true;
							if (this._savedFrameRate) Laya.stage.frameRate = this._savedFrameRate;
						}

						// 恢复输入
						if (Laya.stage) Laya.stage.mouseEnabled = true;
						if (Laya.MouseManager) Laya.MouseManager.enabled = true;

						// 恢复静音状态
						if (Laya.SoundManager) {
							Laya.SoundManager.soundMuted = !!this.soundMuted;
							Laya.SoundManager.musicMuted = !!this.musicMuted;
						}
					}

					const ov = document.getElementById('gd-pause-overlay');
					if (ov) ov.classList.remove('on');

					window.__AD_LOCK__ = false;
					this.saved = false;

				} catch (e) { console.warn('[GD] hard resume error:', e); }
			}
		};

		// 保持之前事件绑定不变：
		// SDK_GAME_PAUSE -> PauseMgr.pause()
		// SDK_GAME_START -> PauseMgr.resume()
		// SDK_REWARDED_WATCH_COMPLETE -> PauseMgr.resume() 然后发奖

		// 兼容你之前的函数名（如果项目里有调用）
		window.__gdPauseForAd = () => PauseMgr.pause();
		window.__gdResumeFromAd = () => PauseMgr.resume();

		/************  GD SDK 接入（按你的 gameId）  ************/
		window.GD_OPTIONS = Object.assign(window.GD_OPTIONS || {}, {
			gameId: "f9efa6a562ca44dfb5cf4558309beba7",
			onEvent: function (event) {
				switch (event.name) {
					case "SDK_READY":
						console.log("[GD] SDK_READY");
						StartGame();                 // SDK 初始化完成后才进入游戏
						break;
					case "SDK_GAME_PAUSE":
						console.log("[GD] SDK_GAME_PAUSE");
						PauseMgr.pause();            // 广告展示 -> 暂停/静音/屏蔽输入
						break;
					case "SDK_GAME_START":
						console.log("[GD] SDK_GAME_START");
						PauseMgr.resume();           // 广告结束 -> 恢复
						break;
					case "SDK_REWARDED_WATCH_COMPLETE":
						console.log("[GD] Reward complete");
						PauseMgr.resume();           // 先恢复再安全发奖（发奖逻辑放你游戏里）
						break;
					// 可按需处理 GDPR：SDK_GDPR_TRACKING / SDK_GDPR_TARGETING
				}
			}
		});

		StartGame();                 // SDK 初始化完成后才进入游戏

		/************  可选：安全封装，主动调用广告时使用  ************/
		window.showInterstitialSafe = async function () {
			try { PauseMgr.pause(); await gdsdk.showAd('interstitial'); }
			catch (e) { console.warn('[GD] interstitial failed:', e); }
			finally { PauseMgr.resume(); }
		};
		window.showRewardedSafe = async function () {
			try { PauseMgr.pause(); return await gdsdk.showAd('rewarded'); }
			catch (e) { throw e; }
			finally { PauseMgr.resume(); }
		};

		/************  兜底：切后台也暂停，回前台恢复  ************/
		document.addEventListener('visibilitychange', () => {
			if (document.hidden) PauseMgr.pause(); else PauseMgr.resume();
		});
	</script>

	<script type="text/javascript">
		function StartGame(url) {
			var s = document.createElement('script');
			s.src = 'index.js';  // ← 如果你的入口不是 index.js，这里改掉
			s.async = false;
			document.body.appendChild(s);
		}
		function loadLib(url) {
			var script = document.createElement("script");
			script.async = false;
			script.src = url;
			document.body.appendChild(script);
		}
	</script>

</body>
