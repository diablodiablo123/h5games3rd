<!DOCTYPE html>
<html lang="en-us">
  <head>
    <meta charset="utf-8" />
    <meta http-equiv="Content-Type" content="text/html; charset=utf-8" />
    <title>Mega Jump</title>
    <style>
      html,
      body {
        width: 100%;
        height: 100%;
        padding: 0px;
        margin: 0px;
        display: flex;
        align-items: center;
        justify-content: center;
        background: #0e9ae8;
      }
      .fullscreen {
        background: #242424;
        align-self: center;
        width: 405;
        height: calc(720 - 50px); /* 留出 banner 广告空间 */
        position: absolute;
        margin-inline: auto;
        max-height: 100%
      }
      #loading-overlay {
        font-size: 20px;
        z-index: 1;
        display: flex;
        flex-direction: column;
        justify-content: center;
        align-items: center;
      }
      #icon {
        max-width: 100px;
        border-radius: 10px;
        margin-bottom: 20px;
      }
      #progress-bar {
        border-radius: 5px;
        width: 90%;
        max-width: 250px;
        height: 20px;
        background: #181818;
        padding: 5px;
      }
      #progress-bar-fill {
        border-radius: 3px;
        width: 0%;
        height: 100%;
        background: #9747ff;
      }
    </style>
  </head>
  <body>
    <script type="application/javascript" src="https://play.delmagames.com/DelmaGameSDK2.0.js"></script>

    <canvas id="canvas" class="fullscreen"></canvas>
    <div id="loading-overlay" class="fullscreen">
      <img id="icon" src="./icon.png" />
      <div id="progress-bar"><div id="progress-bar-fill"></div></div>
    </div>
    <script src="./playgama-bridge.js"></script>
    <script>
      if (/iPhone|iPad|iPod|Android/i.test(navigator.userAgent)) {
        let meta = document.createElement("meta");
        meta.name = "viewport";
        meta.content =
          "width=device-width, height=device-height, initial-scale=1.0, user-scalable=no, shrink-to-fit=yes";
        document.getElementsByTagName("head")[0].appendChild(meta);
      }

      let canvas = document.getElementById("canvas");
      let loadingOverlay = document.getElementById("loading-overlay");
      let progressBarFill = document.getElementById("progress-bar-fill");

      const STORAGE_DATA_SEPARATOR = "{bridge_data_separator}";
      const STORAGE_KEYS_SEPARATOR = "{bridge_keys_separator}";
      const STORAGE_VALUES_SEPARATOR = "{bridge_values_separator}";

      canvas.style.aspectRatio = "9 / 16";

      if (9 >= 16) {
        canvas.style.width = "100%";
      } else {
        canvas.style.height = "100%";
      }

      // utils
      window.unityInstance = null;
      let progressBarFillingInterval = null;
      let progressBarCompleteFillingStarted = false;

      function sendMessageToUnity(name, value) {
        if (window.unityInstance !== null) {
          window.unityInstance.SendMessage("PlaygamaBridge", name, value);
        }
      }

      function onUnityLoadingProgressChanged(progress) {
        if (progress >= 1 && progressBarFillingInterval !== null) {
          clearInterval(progressBarFillingInterval);
          progressBarFillingInterval = null;
          return;
        }

        if (progressBarCompleteFillingStarted) {
          return;
        }

        if (progress >= 0.9) {
          progressBarCompleteFillingStarted = true;
          completeProgressBarFilling();
          return;
        }

        progressBarFill.style.width = `${progress * 100}%`;
      }

      function completeProgressBarFilling() {
        if (progressBarFillingInterval !== null) {
          return;
        }

        let currentPercent = 90;
        progressBarFill.style.width = `${currentPercent}%`;
        progressBarFillingInterval = setInterval(() => {
          currentPercent++;
          if (currentPercent > 100) {
            currentPercent = 100;
          }

          progressBarFill.style.width = `${currentPercent}%`;

          if (currentPercent >= 100) {
            clearInterval(progressBarFillingInterval);
            progressBarFillingInterval = null;
            return;
          }
        }, 100);
      }

      // 输入优化：确保所有输入事件都能正确聚焦并快速响应
      const inputEvents = ["pointerdown", "touchstart", "mousedown", "click"];
      inputEvents.forEach((eventType) => {
        window.addEventListener(
          eventType,
          (e) => {
            window.focus();
            canvas.focus();
            // 阻止默认行为以减少输入延迟
            if (eventType === "touchstart") {
              e.preventDefault();
            }
          },
          { passive: false }
        );
      });

      // 禁用双击缩放，提升触摸响应
      let lastTouchEnd = 0;
      document.addEventListener(
        "touchend",
        (e) => {
          const now = Date.now();
          if (now - lastTouchEnd <= 300) {
            e.preventDefault();
          }
          lastTouchEnd = now;
        },
        false
      );

      // initialization
      bridge
        .initialize()
        .then(() => {
          bridge.advertisement.on("banner_state_changed", (state) =>
            sendMessageToUnity("OnBannerStateChanged", state)
          );
          bridge.advertisement.on("interstitial_state_changed", (state) =>
            sendMessageToUnity("OnInterstitialStateChanged", state)
          );
          bridge.advertisement.on("rewarded_state_changed", (state) =>
            sendMessageToUnity("OnRewardedStateChanged", state)
          );
          bridge.game.on("visibility_state_changed", (state) =>
            sendMessageToUnity("OnVisibilityStateChanged", state)
          );

          let unityLoader = document.createElement("script");
          unityLoader.src = "Build/MegaJumpWeb-Build.loader.js";
          unityLoader.onload = () => {
            createUnityInstance(
              canvas,
              {
                dataUrl: "Build/MegaJumpWeb-Build.data.unityweb",
                frameworkUrl: "Build/MegaJumpWeb-Build.framework.js.unityweb",
                codeUrl: "Build/MegaJumpWeb-Build.wasm.unityweb",
                symbolsUrl: "Build/MegaJumpWeb-Build.symbols.json.unityweb",
                streamingAssetsUrl: "StreamingAssets",
                companyName: "Iron Fox Games",
                productName: "Mega Jump",
                productVersion: "1.1.2",
                // matchWebGLToCanvasSize: false, // Uncomment this to separately control WebGL canvas render size and DOM element size.
                devicePixelRatio: window.devicePixelRatio || 1, // 启用高DPI渲染，提升画面清晰度
              },
              onUnityLoadingProgressChanged
            )
              .then((unityInstance) => {
                window.unityInstance = unityInstance;
                loadingOverlay.remove();
                canvas.focus();
              })
              .catch((error) => {
                console.error(error);
              });
          };
          document.body.appendChild(unityLoader);
        })
        .catch((error) => console.error(error));

      // storage

      window.getIsStorageAvailable = function (storageType) {

      window.getStorageData = function (key, storageType) {
        let keys = key.split(STORAGE_KEYS_SEPARATOR);

        bridge.storage
          .get(keys, storageType, false)
          .then((data) => {
            if (keys.length > 1) {
              let values = [];

              for (let i = 0; i < keys.length; i++) {
                let value = data[i];
                if (value) {
                  if (typeof value !== "string") {
                    value = JSON.stringify(value);
                  }

                  values.push(value);
                } else {
                  values.push("");
                }
              }

              sendMessageToUnity(
                "OnGetStorageDataSuccess",
                `${key}${STORAGE_DATA_SEPARATOR}${values.join(
                  STORAGE_VALUES_SEPARATOR
                )}`
              );
            } else {
              if (data[0]) {
                if (typeof data[0] !== "string") {
                  data = JSON.stringify(data[0]);
                }
              } else {
                data = "";
              }

              sendMessageToUnity(
                "OnGetStorageDataSuccess",
                `${key}${STORAGE_DATA_SEPARATOR}${data}`
              );
            }
          })
          .catch((error) => {
            sendMessageToUnity("OnGetStorageDataFailed", key);
          });
      };

      window.setStorageData = function (key, value, storageType) {
        let keys = key.split(STORAGE_KEYS_SEPARATOR);
        let values = value.split(STORAGE_VALUES_SEPARATOR);

        bridge.storage
          .set(keys, values, storageType)
          .then(() => {
            sendMessageToUnity("OnSetStorageDataSuccess", key);
          })
          .catch((error) => {
            sendMessageToUnity("OnSetStorageDataFailed", key);
          });
      };

      window.deleteStorageData = function (key, storageType) {
        let keys = key.split(STORAGE_KEYS_SEPARATOR);

        bridge.storage
          .delete(keys, storageType)
          .then(() => {
            sendMessageToUnity("OnDeleteStorageDataSuccess", key);
          })
          .catch((error) => {
            sendMessageToUnity("OnDeleteStorageDataFailed", key);
          });
      };

      window.showBanner = function (position, placement) {
        if (bridge && bridge.advertisement) {
          bridge.advertisement.showBanner(position, placement).catch((e) => console.warn("[Bridge] showBanner failed:", e));
        } else {
          console.warn("[Bridge] bridge not initialized");
        }

      window.hideBanner = function () {
        if (bridge && bridge.advertisement) {
          bridge.advertisement.hideBanner().catch((e) => console.warn("[Bridge] hideBanner failed:", e));
        } else {
          console.warn("[Bridge] bridge not initialized");
        }
      };

      window.showInterstitial = function (placement) {
        if (bridge && bridge.advertisement) {
          var _adCallbackFired = false;
          function _interstitialDone() {
            if (_adCallbackFired) return;
            _adCallbackFired = true;
            sendMessageToUnity("OnInterstitialStateChanged", "closed");
          }
          // 安全超时：若2秒内广告无任何回调，自动放行游戏流程
          var _safetyTimer = setTimeout(function () {
            if (!_adCallbackFired) {
              console.warn("[Ad] Interstitial timed out, resuming game.");
              _interstitialDone();
            }
          }, 2000);
          try {
            var interstitialPromise = bridge.advertisement.showInterstitial(placement);
            if (interstitialPromise && typeof interstitialPromise.catch === "function") {
              interstitialPromise
                .then(() => {
                  clearTimeout(_safetyTimer);
                  _adCallbackFired = true;
                  sendMessageToUnity("OnInterstitialStateChanged", "closed");
                })
                .catch((e) => {
                  console.warn("[Ad] Interstitial not available:", e);
                  clearTimeout(_safetyTimer);
                  _interstitialDone();
                });
            }
          } catch (e) {
            console.warn("[Ad] Interstitial call failed:", e);
            clearTimeout(_safetyTimer);
            _interstitialDone();
          }
        } else {
          console.warn("[Ad] bridge not initialized, skipping interstitial.");
          sendMessageToUnity("OnInterstitialStateChanged", "closed");
        }
      };

      window.showRewarded = function (placement) {
        if (bridge && bridge.advertisement) {
          var _rewardCallbackFired = false;
          function _rewardedDone(state) {
            if (_rewardCallbackFired) return;
            _rewardCallbackFired = true;
            sendMessageToUnity("OnRewardedStateChanged", state || "closed");
          }
          // 安全超时：若2秒内广告无任何回调，自动放行游戏流程
          var _safetyTimer = setTimeout(function () {
            if (!_rewardCallbackFired) {
              console.warn("[Ad] Rewarded timed out, resuming game.");
              _rewardedDone("closed");
            }
          }, 2000);
          try {
            var rewardedPromise = bridge.advertisement.showRewarded(placement);
            if (rewardedPromise && typeof rewardedPromise.catch === "function") {
              rewardedPromise
                .then(() => {
                  clearTimeout(_safetyTimer);
                  _rewardCallbackFired = true;
                })
                .catch((e) => {
                  console.warn("[Ad] Rewarded not available:", e);
                  clearTimeout(_safetyTimer);
                  _rewardedDone("closed");
                });
            }
          } catch (e) {
            console.warn("[Ad] Rewarded call failed:", e);
            clearTimeout(_safetyTimer);
            _rewardedDone("closed");
          }
        } else {
          console.warn("[Ad] bridge not initialized, skipping rewarded.");
          sendMessageToUnity("OnRewardedStateChanged", "closed");
        }
      };

      };

      window.getIsGetAchievementsListSupported = function () {
        return bridge.achievements.isGetListSupported.toString();
      };

      window.getIsAchievementsNativePopupSupported = function () {
        return bridge.achievements.isNativePopupSupported.toString();
      };

      window.achievementsUnlock = function (options) {
        if (options) {
          options = JSON.parse(options);
        }

        bridge.achievements
          .unlock(options)
          .then(() => {
            sendMessageToUnity("OnAchievementsUnlockCompleted", "true");
          })
          .catch((error) => {
            sendMessageToUnity("OnAchievementsUnlockCompleted", "false");
          });
      };

      window.achievementsShowNativePopup = function (options) {
        if (options) {
          options = JSON.parse(options);
        }

        bridge.achievements
          .showNativePopup(options)
          .then(() => {
            sendMessageToUnity(
              "OnAchievementsShowNativePopupCompleted",
              "true"
            );
          })
          .catch((error) => {
            sendMessageToUnity(
              "OnAchievementsShowNativePopupCompleted",
              "false"
            );
          });
      };

      window.achievementsGetList = function (options) {
        if (options) {
          options = JSON.parse(options);
        }

        bridge.achievements
          .getList(options)
          .then((data) => {
            if (data) {
              if (typeof data !== "string") {
                data = JSON.stringify(data);
              }

              sendMessageToUnity("OnAchievementsGetListCompletedSuccess", data);
            } else {
              sendMessageToUnity("OnAchievementsGetListCompletedSuccess", "");
            }
          })
          .catch((error) => {
            sendMessageToUnity("OnAchievementsGetListCompletedFailed", "false");
          });
      };
    </script>
