<!DOCTYPE html>
<html lang="en-us">
  <head>
    <meta charset="utf-8" />
    <meta http-equiv="Content-Type" content="text/html; charset=utf-8" />
    <title>Mega Jump</title>
    <style>
      html,
      body {
        width: 100%;
        height: 100%;
        padding: 0px;
        margin: 0px;
        display: flex;
        align-items: center;
        justify-content: center;
        background: #0e9ae8;
      }
      .fullscreen {
        background: #242424;
        align-self: center;
        width: 405;
        height: 720px;
        position: absolute;
        margin-inline: auto;
        max-height: 100%
      }
      #loading-overlay {
        font-size: 20px;
        z-index: 1;
        display: flex;
        flex-direction: column;
        justify-content: center;
        align-items: center;
      }
      #icon {
        max-width: 100px;
        border-radius: 10px;
        margin-bottom: 20px;
      }
      #progress-bar {
        border-radius: 5px;
        width: 90%;
        max-width: 250px;
        height: 20px;
        background: #181818;
        padding: 5px;
      }
      #progress-bar-fill {
        border-radius: 3px;
        width: 0%;
        height: 100%;
        background: #9747ff;
      }
    </style>
    <link rel="preconnect" href="https://play.delmagames.com" crossorigin>
  </head>
  <body>
    <script async src="https://play.delmagames.com/DelmaGameSDK2.0.js"></script>

    <canvas id="canvas" class="fullscreen"></canvas>
    <div id="loading-overlay" class="fullscreen">
      <img id="icon" src="./icon.png" />
      <div id="progress-bar"><div id="progress-bar-fill"></div></div>
    </div>
    <script src="./playgama-bridge.js"></script>
    <script>
      if (/iPhone|iPad|iPod|Android/i.test(navigator.userAgent)) {
        let meta = document.createElement("meta");
        meta.name = "viewport";
        meta.content =
          "width=device-width, height=device-height, initial-scale=1.0, user-scalable=no, shrink-to-fit=yes";
        document.getElementsByTagName("head")[0].appendChild(meta);
      }

      let canvas = document.getElementById("canvas");
      let loadingOverlay = document.getElementById("loading-overlay");
      let progressBarFill = document.getElementById("progress-bar-fill");

      const STORAGE_DATA_SEPARATOR = "{bridge_data_separator}";
      const STORAGE_KEYS_SEPARATOR = "{bridge_keys_separator}";
      const STORAGE_VALUES_SEPARATOR = "{bridge_values_separator}";

      canvas.style.aspectRatio = "9 / 16";

      if (9 >= 16) {
        canvas.style.width = "100%";
      } else {
        canvas.style.height = "100%";
      }

      // utils
      window.unityInstance = null;
      let progressBarFillingInterval = null;
      let progressBarCompleteFillingStarted = false;

      function sendMessageToUnity(name, value) {
        if (window.unityInstance !== null) {
          window.unityInstance.SendMessage("PlaygamaBridge", name, value);
        }
      }

      function onUnityLoadingProgressChanged(progress) {
        if (progress >= 1 && progressBarFillingInterval !== null) {
          clearInterval(progressBarFillingInterval);
          progressBarFillingInterval = null;
          return;
        }

        if (progressBarCompleteFillingStarted) {
          return;
        }

        if (progress >= 0.9) {
          progressBarCompleteFillingStarted = true;
          completeProgressBarFilling();
          return;
        }

        progressBarFill.style.width = `${progress * 100}%`;
      }

      function completeProgressBarFilling() {
        if (progressBarFillingInterval !== null) {
          return;
        }

        let currentPercent = 90;
        progressBarFill.style.width = `${currentPercent}%`;
        progressBarFillingInterval = setInterval(() => {
          currentPercent++;
          if (currentPercent > 100) {
            currentPercent = 100;
          }

          progressBarFill.style.width = `${currentPercent}%`;

          if (currentPercent >= 100) {
            clearInterval(progressBarFillingInterval);
            progressBarFillingInterval = null;
            return;
          }
        }, 100);
      }

      // Input optimization
      const inputEvents = ["pointerdown", "touchstart", "mousedown", "click"];
      inputEvents.forEach((eventType) => {
        window.addEventListener(
          eventType,
          (e) => {
            window.focus();
            canvas.focus();
            // Prevent default to reduce input latency
            if (eventType === "touchstart") {
              e.preventDefault();
            }
          },
          { passive: false }
        );
      });

      // Disable double-tap zoom
      let lastTouchEnd = 0;
      document.addEventListener(
        "touchend",
        (e) => {
          const now = Date.now();
          if (now - lastTouchEnd <= 300) {
            e.preventDefault();
          }
          lastTouchEnd = now;
        },
        false
      );

      // Unity loader starts immediately - don't wait for bridge.initialize()
      let unityLoader = document.createElement("script");
      unityLoader.src = "Build/MegaJumpWeb-Build.loader.js";
      unityLoader.onload = () => {
        createUnityInstance(
          canvas,
          {
            dataUrl: "Build/MegaJumpWeb-Build.data.unityweb",
            frameworkUrl: "Build/MegaJumpWeb-Build.framework.js.unityweb",
            codeUrl: "Build/MegaJumpWeb-Build.wasm.unityweb",
            symbolsUrl: "Build/MegaJumpWeb-Build.symbols.json.unityweb",
            streamingAssetsUrl: "StreamingAssets",
            companyName: "Iron Fox Games",
            productName: "Mega Jump",
            productVersion: "1.1.2",
            devicePixelRatio: window.devicePixelRatio || 1,
          },
          onUnityLoadingProgressChanged
        )
          .then((unityInstance) => {
            window.unityInstance = unityInstance;
            loadingOverlay.remove();
            canvas.focus();
          })
          .catch((error) => {
            console.error(error);
          });
      };
      document.body.appendChild(unityLoader);

      // Bridge initialization runs in parallel - doesn't block Unity loading
      if (typeof bridge !== "undefined") {
        bridge.initialize().then(() => {
          bridge.advertisement.on("banner_state_changed", (state) =>
            sendMessageToUnity("OnBannerStateChanged", state)
          );
          bridge.advertisement.on("interstitial_state_changed", (state) =>
            sendMessageToUnity("OnInterstitialStateChanged", state)
          );
          bridge.advertisement.on("rewarded_state_changed", (state) =>
            sendMessageToUnity("OnRewardedStateChanged", state)
          );
          bridge.game.on("visibility_state_changed", (state) =>
            sendMessageToUnity("OnVisibilityStateChanged", state)
          );
        }).catch((error) => console.error(error));
      }

      // platform
      window.getPlatformId = function () {
        return bridge && bridge.platform ? bridge.platform.id : "standalone";
      };

      window.getPlatformLanguage = function () {
        return bridge && bridge.platform ? bridge.platform.language : (navigator.language || "en");
      };

      window.getPlatformPayload = function () {
        if (bridge && bridge.platform) {
          let payload = bridge.platform.payload;
          if (typeof payload === "string") return payload;
        }
        return "";
      };

      window.getPlatformTld = function () {
        if (bridge && bridge.platform) {
          let tld = bridge.platform.tld;
          if (typeof tld === "string") return tld;
        }
        return "";
      };

      window.getIsPlatformGetAllGamesSupported = function () {
        return bridge && bridge.platform ? bridge.platform.isGetAllGamesSupported.toString() : "false";
      };

      window.getIsPlatformGetGameByIdSupported = function () {
        return bridge && bridge.platform ? bridge.platform.isGetGameByIdSupported.toString() : "false";
      };

      window.sendMessageToPlatform = function (message) {
        if (bridge && bridge.platform) bridge.platform.sendMessage(message);
      };

      window.getServerTime = function () {
        if (bridge && bridge.platform) {
          bridge.platform.getServerTime()
            .then((result) => {
              sendMessageToUnity("OnGetServerTimeCompleted", result.toString());
            })
            .catch((error) => {
              sendMessageToUnity("OnGetServerTimeCompleted", "false");
            });
        } else {
          sendMessageToUnity("OnGetServerTimeCompleted", Date.now().toString());
        }
      };

      window.getAllGames = function () {
        if (bridge && bridge.platform) {
          bridge.platform.getAllGames()
            .then((result) => {
              sendMessageToUnity("OnGetAllGamesCompletedSuccess", JSON.stringify(result));
            })
            .catch((error) => {
              sendMessageToUnity("OnGetAllGamesCompletedFailed");
            });
        } else {
          sendMessageToUnity("OnGetAllGamesCompletedFailed");
        }
      };

      window.getGameById = function (options) {
        if (options) options = JSON.parse(options);
        else options = {};

        if (bridge && bridge.platform) {
          bridge.platform.getGameById(options)
            .then((result) => {
              sendMessageToUnity("OnGetGameByIdCompletedSuccess", JSON.stringify(result));
            })
            .catch((error) => {
              sendMessageToUnity("OnGetGameByIdCompletedFailed");
            });
        } else {
          sendMessageToUnity("OnGetGameByIdCompletedFailed");
        }
      };

      // device
      window.getDeviceType = function () {
        if (bridge && bridge.device) return bridge.device.type;
        if (/iPhone|iPad|iPod/i.test(navigator.userAgent)) return "ios";
        if (/Android/i.test(navigator.userAgent)) return "android";
        return "desktop";
      };

      // player
      window.getIsPlayerAuthorizationSupported = function () {
        return bridge && bridge.player ? bridge.player.isAuthorizationSupported.toString() : "false";
      };

      window.getIsPlayerAuthorized = function () {
        return bridge && bridge.player ? bridge.player.isAuthorized.toString() : "false";
      };

      window.getPlayerId = function () {
        if (bridge && bridge.player && bridge.player.id) return bridge.player.id.toString();
        return "";
      };

      window.getPlayerName = function () {
        if (bridge && bridge.player && bridge.player.name) return bridge.player.name.toString();
        return "";
      };

      window.getPlayerPhotos = function () {
        if (bridge && bridge.player && bridge.player.photos && bridge.player.photos.length > 0) {
          return JSON.stringify(bridge.player.photos);
        }
        return "";
      };

      window.authorizePlayer = function (options) {
        if (options) options = JSON.parse(options);
        if (bridge && bridge.player) {
          bridge.player.authorize(options)
            .then(() => { sendMessageToUnity("OnAuthorizeCompleted", "true"); })
            .catch(() => { sendMessageToUnity("OnAuthorizeCompleted", "false"); });
        } else {
          sendMessageToUnity("OnAuthorizeCompleted", "false");
        }
      };

      // game
      window.getVisibilityState = function () {
        return bridge && bridge.game ? bridge.game.visibilityState : (document.hidden ? "hidden" : "visible");
      };

      // storage - fallback to localStorage when bridge not ready
      window.getStorageDefaultType = function () {
        return bridge && bridge.storage ? bridge.storage.defaultType : "local";
      };

      window.getIsStorageSupported = function (storageType) {
        return bridge && bridge.storage ? bridge.storage.isSupported(storageType).toString() : "true";
      };

      window.getIsStorageAvailable = function (storageType) {
        if (bridge && bridge.storage) return bridge.storage.isAvailable(storageType).toString();
        try { localStorage.setItem("__test__", "1"); localStorage.removeItem("__test__"); return "true"; } catch (e) { return "false"; }
      };

      window.getStorageData = function (key, storageType) {
        if (bridge && bridge.storage) {
          let keys = key.split(STORAGE_KEYS_SEPARATOR);
          bridge.storage.get(keys, storageType, false)
            .then((data) => {
              if (keys.length > 1) {
                let values = [];
                for (let i = 0; i < keys.length; i++) {
                  let value = data[i];
                  if (value) {
                    if (typeof value !== "string") value = JSON.stringify(value);
                    values.push(value);
                  } else {
                    values.push("");
                  }
                }
                sendMessageToUnity("OnGetStorageDataSuccess", `${key}${STORAGE_DATA_SEPARATOR}${values.join(STORAGE_VALUES_SEPARATOR)}`);
              } else {
                if (data[0]) {
                  if (typeof data[0] !== "string") data = JSON.stringify(data[0]);
                } else {
                  data = "";
                }
                sendMessageToUnity("OnGetStorageDataSuccess", `${key}${STORAGE_DATA_SEPARATOR}${data}`);
              }
            })
            .catch(() => { _fallbackGetStorageData(key); });
        } else {
          _fallbackGetStorageData(key);
        }
      };

      function _fallbackGetStorageData(key) {
        let keys = key.split(STORAGE_KEYS_SEPARATOR);
        let values = [];
        for (let i = 0; i < keys.length; i++) {
          values.push(localStorage.getItem(keys[i]) || "");
        }
        if (keys.length > 1) {
          sendMessageToUnity("OnGetStorageDataSuccess", `${key}${STORAGE_DATA_SEPARATOR}${values.join(STORAGE_VALUES_SEPARATOR)}`);
        } else {
          sendMessageToUnity("OnGetStorageDataSuccess", `${key}${STORAGE_DATA_SEPARATOR}${values[0]}`);
        }
      }

      window.setStorageData = function (key, value, storageType) {
        if (bridge && bridge.storage) {
          let keys = key.split(STORAGE_KEYS_SEPARATOR);
          let values = value.split(STORAGE_VALUES_SEPARATOR);
          bridge.storage.set(keys, values, storageType)
            .then(() => { sendMessageToUnity("OnSetStorageDataSuccess", key); })
            .catch(() => { _fallbackSetStorageData(key, value); });
        } else {
          _fallbackSetStorageData(key, value);
        }
      };

      function _fallbackSetStorageData(key, value) {
        let keys = key.split(STORAGE_KEYS_SEPARATOR);
        let values = value.split(STORAGE_VALUES_SEPARATOR);
        for (let i = 0; i < keys.length; i++) {
          localStorage.setItem(keys[i], values[i]);
        }
        sendMessageToUnity("OnSetStorageDataSuccess", key);
      }

      window.deleteStorageData = function (key, storageType) {
        if (bridge && bridge.storage) {
          let keys = key.split(STORAGE_KEYS_SEPARATOR);
          bridge.storage.delete(keys, storageType)
            .then(() => { sendMessageToUnity("OnDeleteStorageDataSuccess", key); })
            .catch(() => { _fallbackDeleteStorageData(key); });
        } else {
          _fallbackDeleteStorageData(key);
        }
      };

      function _fallbackDeleteStorageData(key) {
        let keys = key.split(STORAGE_KEYS_SEPARATOR);
        for (let i = 0; i < keys.length; i++) {
          localStorage.removeItem(keys[i]);
        }
        sendMessageToUnity("OnDeleteStorageDataSuccess", key);
      };

      // advertisement - 使用 DelmaGameSDK + MiniGameAds
      // 注意：window.showBanner / window.hideBanner 已由 DelmaGameSDK2.0.js 自动定义
      var _interstitialState = "loaded";

      window.getInterstitialState = function () {
        return _interstitialState;
      };

      window.getIsBannerSupported = function () {
        return "true";
      };

      window.getIsInterstitialSupported = function () {
        return "true";
      };

      window.getMinimumDelayBetweenInterstitial = function () {
        return "30";
      };

      window.setMinimumDelayBetweenInterstitial = function (options) {
        // No-op
      };

      window.getIsRewardedSupported = function () {
        return "true";
      };

      window.getRewardedPlacement = function () {
        return "";
      };

      window.showInterstitial = function (placement) {
        if (window.MiniGameAds) {
          _interstitialState = "loading";
          var _adCallbackFired = false;
          function _interstitialDone() {
            if (_adCallbackFired) return;
            _adCallbackFired = true;
            _interstitialState = "loaded";
            sendMessageToUnity("OnInterstitialStateChanged", "closed");
          }
          // 安全超时：若2秒内广告无任何回调，自动放行游戏流程
          var _safetyTimer = setTimeout(function () {
            if (!_adCallbackFired) {
              console.warn("[Ad] Interstitial timed out, resuming game.");
              _interstitialDone();
            }
          }, 2000);
          try {
            var interstitialPromise = MiniGameAds.showInterstitial({
              beforeAd: () => {
                _adCallbackFired = true;
                clearTimeout(_safetyTimer);
                _interstitialState = "opened";
                sendMessageToUnity("OnInterstitialStateChanged", "opened");
              },
              afterAd: () => {
                clearTimeout(_safetyTimer);
                _interstitialState = "closed";
                sendMessageToUnity("OnInterstitialStateChanged", "closed");
              },
              adBreakDone: (result) => {
                console.log("Interstitial ad break done:", result);
                clearTimeout(_safetyTimer);
                _interstitialDone();
              },
            });
            if (interstitialPromise && typeof interstitialPromise.catch === "function") {
              interstitialPromise.catch((error) => {
                console.warn("[Ad] Interstitial not available:", error);
                clearTimeout(_safetyTimer);
                _interstitialDone();
              });
            }
          } catch (e) {
            console.warn("[Ad] Interstitial call failed:", e);
            clearTimeout(_safetyTimer);
            _interstitialDone();
          }
        } else {
          console.warn("[Ad] MiniGameAds not ready, skipping interstitial.");
          sendMessageToUnity("OnInterstitialStateChanged", "closed");
        }
      };

      window.showRewarded = function (placement) {
        if (window.MiniGameAds) {
          var _rewardCallbackFired = false;
          function _rewardedDone(state) {
            if (_rewardCallbackFired) return;
            _rewardCallbackFired = true;
            sendMessageToUnity("OnRewardedStateChanged", state || "closed");
          }
          // 安全超时：若2秒内广告无任何回调，自动放行游戏流程
          var _safetyTimer = setTimeout(function () {
            if (!_rewardCallbackFired) {
              console.warn("[Ad] Rewarded timed out, resuming game.");
              _rewardedDone("closed");
            }
          }, 2000);
          try {
            var rewardedPromise = MiniGameAds.showRewarded({
              beforeAd: () => {
                _rewardCallbackFired = true;
                clearTimeout(_safetyTimer);
                sendMessageToUnity("OnRewardedStateChanged", "opened");
              },
              afterAd: () => {
                clearTimeout(_safetyTimer);
                sendMessageToUnity("OnRewardedStateChanged", "closed");
              },
              adBreakDone: (result) => {
                console.log("Rewarded ad break done:", result);
                clearTimeout(_safetyTimer);
                _rewardedDone("closed");
              },
              beforeReward: (showAdFn) => {
                showAdFn();
              },
              adDismissed: () => {
                clearTimeout(_safetyTimer);
                _rewardedDone("closed");
              },
              adViewed: () => {
                clearTimeout(_safetyTimer);
                _rewardCallbackFired = true;
                sendMessageToUnity("OnRewardedStateChanged", "rewarded");
              },
            });
            if (rewardedPromise && typeof rewardedPromise.catch === "function") {
              rewardedPromise.catch((error) => {
                console.warn("[Ad] Rewarded not available:", error);
                clearTimeout(_safetyTimer);
                _rewardedDone("closed");
              });
            }
          } catch (e) {
            console.warn("[Ad] Rewarded call failed:", e);
            clearTimeout(_safetyTimer);
            _rewardedDone("closed");
          }
        } else {
          console.warn("[Ad] MiniGameAds not ready, skipping rewarded.");
          sendMessageToUnity("OnRewardedStateChanged", "closed");
        }
      };

      window.checkAdBlock = function () {
        // Simple ad block check
        const testAd = document.createElement("div");
        testAd.innerHTML = "&nbsp;";
        testAd.className = "adsbox";
        document.body.appendChild(testAd);
        const isBlocked = testAd.offsetHeight === 0;
        document.body.removeChild(testAd);
        sendMessageToUnity("OnCheckAdBlockCompleted", (!isBlocked).toString());
      };

      // social
      window.getIsShareSupported = function () {
        return bridge && bridge.social ? bridge.social.isShareSupported.toString() : "false";
      };
      window.getIsInviteFriendsSupported = function () {
        return bridge && bridge.social ? bridge.social.isInviteFriendsSupported.toString() : "false";
      };
      window.getIsJoinCommunitySupported = function () {
        return bridge && bridge.social ? bridge.social.isJoinCommunitySupported.toString() : "false";
      };
      window.getIsCreatePostSupported = function () {
        return bridge && bridge.social ? bridge.social.isCreatePostSupported.toString() : "false";
      };
      window.getIsAddToHomeScreenSupported = function () {
        return bridge && bridge.social ? bridge.social.isAddToHomeScreenSupported.toString() : "false";
      };
      window.getIsAddToFavoritesSupported = function () {
        return bridge && bridge.social ? bridge.social.isAddToFavoritesSupported.toString() : "false";
      };
      window.getIsRateSupported = function () {
        return bridge && bridge.social ? bridge.social.isRateSupported.toString() : "false";
      };
      window.getIsExternalLinksAllowed = function () {
        return bridge && bridge.social ? bridge.social.isExternalLinksAllowed.toString() : "true";
      };

      function _socialFallback(msg) { sendMessageToUnity(msg, "false"); }

      window.share = function (options) {
        if (options) options = JSON.parse(options);
        if (bridge && bridge.social) {
          bridge.social.share(options).then(() => { sendMessageToUnity("OnShareCompleted", "true"); }).catch(() => { _socialFallback("OnShareCompleted"); });
        } else { _socialFallback("OnShareCompleted"); }
      };
      window.inviteFriends = function (options) {
        if (options) options = JSON.parse(options);
        if (bridge && bridge.social) {
          bridge.social.inviteFriends(options).then(() => { sendMessageToUnity("OnInviteFriendsCompleted", "true"); }).catch(() => { _socialFallback("OnInviteFriendsCompleted"); });
        } else { _socialFallback("OnInviteFriendsCompleted"); }
      };
      window.joinCommunity = function (options) {
        if (options) options = JSON.parse(options);
        if (bridge && bridge.social) {
          bridge.social.joinCommunity(options).then(() => { sendMessageToUnity("OnJoinCommunityCompleted", "true"); }).catch(() => { _socialFallback("OnJoinCommunityCompleted"); });
        } else { _socialFallback("OnJoinCommunityCompleted"); }
      };
      window.createPost = function (options) {
        if (options) options = JSON.parse(options);
        if (bridge && bridge.social) {
          bridge.social.createPost(options).then(() => { sendMessageToUnity("OnCreatePostCompleted", "true"); }).catch(() => { _socialFallback("OnCreatePostCompleted"); });
        } else { _socialFallback("OnCreatePostCompleted"); }
      };
      window.addToHomeScreen = function () {
        if (bridge && bridge.social) {
          bridge.social.addToHomeScreen().then(() => { sendMessageToUnity("OnAddToHomeScreenCompleted", "true"); }).catch(() => { _socialFallback("OnAddToHomeScreenCompleted"); });
        } else { _socialFallback("OnAddToHomeScreenCompleted"); }
      };
      window.addToFavorites = function () {
        if (bridge && bridge.social) {
          bridge.social.addToFavorites().then(() => { sendMessageToUnity("OnAddToFavoritesCompleted", "true"); }).catch(() => { _socialFallback("OnAddToFavoritesCompleted"); });
        } else { _socialFallback("OnAddToFavoritesCompleted"); }
      };
      window.rate = function () {
        if (bridge && bridge.social) {
          bridge.social.rate().then(() => { sendMessageToUnity("OnRateCompleted", "true"); }).catch(() => { _socialFallback("OnRateCompleted"); });
        } else { _socialFallback("OnRateCompleted"); }
      };

      // leaderboard
      window.getIsLeaderboardSupported = function () {
        return bridge && bridge.leaderboard ? bridge.leaderboard.isSupported.toString() : "false";
      };

      window.getIsLeaderboardNativePopupSupported = function () {
        return bridge && bridge.leaderboard ? bridge.leaderboard.isNativePopupSupported.toString() : "false";
      };

      window.getIsLeaderboardSetScoreSupported = function () {
        return bridge && bridge.leaderboard ? bridge.leaderboard.isSetScoreSupported.toString() : "false";
      };

      window.getIsLeaderboardGetScoreSupported = function () {
        return bridge && bridge.leaderboard ? bridge.leaderboard.isGetScoreSupported.toString() : "false";
      };

      window.getIsLeaderboardGetEntriesSupported = function () {
        return bridge && bridge.leaderboard ? bridge.leaderboard.isGetEntriesSupported.toString() : "false";
      };

      window.leaderboardSetScore = function (options) {
        if (options) options = JSON.parse(options);
        if (bridge && bridge.leaderboard) {
          bridge.leaderboard.setScore(options)
            .then(() => { sendMessageToUnity("OnLeaderboardSetScoreCompleted", "true"); })
            .catch(() => { sendMessageToUnity("OnLeaderboardSetScoreCompleted", "false"); });
        } else {
          sendMessageToUnity("OnLeaderboardSetScoreCompleted", "false");
        }
      };

      window.leaderboardGetScore = function (options) {
        if (options) options = JSON.parse(options);
        if (bridge && bridge.leaderboard) {
          bridge.leaderboard.getScore(options)
            .then((data) => {
              if (data) {
                if (typeof data !== "string") data = JSON.stringify(data);
                sendMessageToUnity("OnLeaderboardGetScoreCompleted", data);
              } else {
                sendMessageToUnity("OnLeaderboardGetScoreCompleted", "");
              }
            })
            .catch(() => { sendMessageToUnity("OnLeaderboardGetScoreCompleted", "false"); });
        } else {
          sendMessageToUnity("OnLeaderboardGetScoreCompleted", "false");
        }
      };

      window.leaderboardGetEntries = function (options) {
        if (options) options = JSON.parse(options);
        if (bridge && bridge.leaderboard) {
          bridge.leaderboard.getEntries(options)
            .then((data) => {
              if (data) {
                sendMessageToUnity("OnLeaderboardGetEntriesCompletedSuccess", JSON.stringify(data));
              } else {
                sendMessageToUnity("OnLeaderboardGetEntriesCompletedSuccess", "");
              }
            })
            .catch(() => { sendMessageToUnity("OnLeaderboardGetEntriesCompletedFailed", "false"); });
        } else {
          sendMessageToUnity("OnLeaderboardGetEntriesCompletedFailed", "false");
        }

      window.leaderboardShowNativePopup = function (options) {
