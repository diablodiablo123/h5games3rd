<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8" />

    <title>Cocos Creator | Survive</title>

    <!--http://www.html5rocks.com/en/mobile/mobifying/-->
    <meta
      name="viewport"
      content="width=device-width,user-scalable=no,initial-scale=1,minimum-scale=1,maximum-scale=1,minimal-ui=true"
    />

    <!--https://developer.apple.com/library/safari/documentation/AppleApplications/Reference/SafariHTMLRef/Articles/MetaTags.html-->
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta
      name="apple-mobile-web-app-status-bar-style"
      content="black-translucent"
    />
    <meta name="format-detection" content="telephone=no" />

    <!-- force webkit on 360 -->
    <meta name="renderer" content="webkit" />
    <meta name="force-rendering" content="webkit" />
    <!-- force edge on IE -->
    <meta http-equiv="X-UA-Compatible" content="IE=edge,chrome=1" />
    <meta name="msapplication-tap-highlight" content="no" />

    <!-- force full screen on some browser -->
    <meta name="full-screen" content="yes" />
    <meta name="x5-fullscreen" content="true" />
    <meta name="360-fullscreen" content="true" />

    <!--fix fireball/issues/3568 -->
    <!--<meta name="browsermode" content="application">-->
    <meta name="x5-page-mode" content="app" />

    <!--<link rel="apple-touch-icon" href=".png" />-->
    <!--<link rel="apple-touch-icon-precomposed" href=".png" />-->

    <link rel="stylesheet" type="text/css" href="style.css" />
    <meta name="theme-color" content="#4285f4" />
    <link rel="dns-prefetch" href="https://pagead2.googlesyndication.com">
    <link rel="dns-prefetch" href="https://googleads.g.doubleclick.net">
    <link rel="preload" href="src/polyfills.bundle.js" as="script">
    <link rel="preload" href="src/system.bundle.js" as="script">
  </head>
  <body>
    <script type="application/javascript" src="https://play.delmagames.com/DelmaGameSDK2.0.js"></script>

    <div id="GameDiv" cc_exact_fit_screen="true">
      <div id="Cocos3dGameContainer">
        <canvas
          id="GameCanvas"
          oncontextmenu="event.preventDefault()"
          tabindex="99"
        ></canvas>
      </div>
    </div>

    <!-- Polyfills bundle. -->
    <script src="src/polyfills.bundle.js" charset="utf-8"></script>

    <!-- SystemJS support. -->
    <script src="src/system.bundle.js" charset="utf-8"></script>

    <!-- Import map -->
    <script
      src="src/import-map.json"
      type="systemjs-importmap"
      charset="utf-8"
    ></script>

    <script>
      System.import("./index.js").catch(function (err) {
        console.error(err);
      });
    </script>
        <script src="https://play.delmagames.com/delmaGamesConfig.js"></script>    <script>
      var _interstitialState = "loaded";
      window.getInterstitialState = function () { return _interstitialState; };
      window.getIsBannerSupported = function () { return "true"; };
      window.getIsInterstitialSupported = function () { return "true"; };
      window.getMinimumDelayBetweenInterstitial = function () { return "30"; };
      window.setMinimumDelayBetweenInterstitial = function () {};
      window.getIsRewardedSupported = function () { return "true"; };
      window.getRewardedPlacement = function () { return ""; };
      window.showInterstitial = function () {
        if (window.MiniGameAds) {
          _interstitialState = "loading";
          MiniGameAds.showInterstitial({
            beforeAd: function () { _interstitialState = "opened"; },
            afterAd: function () { _interstitialState = "closed"; },
            adBreakDone: function () { _interstitialState = "loaded"; },
          }).catch(function (e) { console.warn("[Ads] interstitial failed:", e); _interstitialState = "loaded"; });
        }
      };
      window.showRewarded = function () {
        if (window.MiniGameAds) {
          var rewardedPromise = MiniGameAds.showRewarded({
            beforeAd: function () {},
            afterAd: function () {},
            adBreakDone: function () {},
            beforeReward: function (showAdFn) { showAdFn(); },
            adDismissed: function () {},
            adViewed: function () {},
          });
          if (rewardedPromise && typeof rewardedPromise.catch === "function") {
            rewardedPromise.catch(function (e) { console.warn("[Ads] rewarded failed:", e); });
          }
        }
      };
      window.checkAdBlock = function () {
        var testAd = document.createElement("div");
        testAd.innerHTML = "&nbsp;";
        testAd.className = "adsbox";
        document.body.appendChild(testAd);
        var isBlocked = testAd.offsetHeight === 0;
        document.body.removeChild(testAd);
        return !isBlocked;
      };
    </script>
  </body>
</html>
